<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeopleCore — My Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.0"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--p:#4F46E5;--pl:#EEF2FF;--pd:#3730A3;--ok:#10B981;--okl:#D1FAE5;--wa:#F59E0B;--wal:#FEF3C7;--er:#EF4444;--erl:#FEE2E2;--bg:#F8FAFC;--sb:#1E1B4B;--sbt:#C7D2FE;--sbh:#312E81;--tx:#1E293B;--tm:#64748B;--tl:#94A3B8;--bd:#E2E8F0;--r:9px;--sh:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}
.shell{display:flex;height:100vh;overflow:hidden}
.sb{width:230px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{padding:15px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.sb-ico{width:31px;height:31px;background:var(--p);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-ico i{color:white;font-size:13px}
.sb-title{color:white;font-weight:700;font-size:14px}
.sb-user{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.av{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0}
.u-name{color:white;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-role{color:var(--sbt);font-size:11px}
.sb-nav{flex:1;padding:9px 8px;overflow-y:auto}
.nl{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;padding:7px 10px 3px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:7px;cursor:pointer;color:var(--sbt);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px}
.ni:hover{background:var(--sbh);color:white}
.ni.on{background:var(--p);color:white}
.ni i{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.sb-ft{padding:9px 8px;border-top:1px solid rgba(255,255,255,.08)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:white;border-bottom:1px solid var(--bd);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);flex-shrink:0}
.tb-title{font-size:15px;font-weight:700}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:9px}
.lob{padding:7px 12px;border:1px solid var(--bd);border-radius:7px;background:white;color:var(--tm);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px}
.ct{flex:1;overflow-y:auto;padding:20px}
.card{background:white;border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh);margin-bottom:15px}
.ch{padding:13px 17px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ct2{padding:17px}
.ctitle{font-size:14px;font-weight:700}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
.sc{background:white;border-radius:var(--r);padding:16px;border:1px solid var(--bd);position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.sc.b::before{background:var(--p)}.sc.g::before{background:var(--ok)}.sc.a::before{background:var(--wa)}.sc.r::before{background:var(--er)}
.sc .sl{font-size:11px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.sc .sv{font-size:24px;font-weight:700;line-height:1;margin-bottom:4px}
.sc .ss{font-size:12px;color:var(--tl)}
.sc .si{position:absolute;right:13px;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.sc.b .si{background:var(--pl);color:var(--p)}.sc.g .si{background:var(--okl);color:var(--ok)}.sc.a .si{background:var(--wal);color:var(--wa)}.sc.r .si{background:var(--erl);color:var(--er)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.bx{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.ok{background:var(--okl);color:#065F46}.wa{background:var(--wal);color:#92400E}.er{background:var(--erl);color:#991B1B}.pr{background:var(--pl);color:var(--pd)}.gy{background:#F1F5F9;color:#475569}.bl{background:#DBEAFE;color:#1D4ED8}.pu{background:#EDE9FE;color:#5B21B6}
.btn{padding:8px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.bp{background:var(--p);color:white}.bp:hover{background:var(--pd)}
.bo{background:white;border:1px solid var(--bd);color:var(--tx)}.bo:hover{background:var(--bg)}
.bd2{background:var(--er);color:white}
.bsm{padding:5px 9px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.fr.f1{grid-template-columns:1fr}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--tm);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
input.i,select.i,textarea.i{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;color:var(--tx);outline:none;background:white;transition:border-color .2s;font-family:inherit}
input.i:focus,select.i:focus,textarea.i:focus{border-color:var(--p)}
textarea.i{resize:vertical;min-height:76px}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:36px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--tl);font-size:14px}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:16px}
.mo.op{display:flex}
.md{background:white;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.mh{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1;border-radius:14px 14px 0 0}
.mt{font-size:15px;font-weight:700}
.mb2{padding:20px}
.mf{padding:13px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:9px;position:sticky;bottom:0;background:white;border-radius:0 0 14px 14px}
.xb{width:27px;height:27px;border-radius:6px;border:1px solid var(--bd);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tm);font-size:12px}
.flex{display:flex;align-items:center}
.gap2{gap:8px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.ph h2{font-size:18px;font-weight:700}
.ph p{font-size:12px;color:var(--tm);margin-top:2px}
.ri{padding:10px 0;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.ri:last-child{border-bottom:none}
.prog{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.pb{height:100%;border-radius:3px}
.lb{margin-bottom:12px}
.lbh{display:flex;justify-content:space-between;margin-bottom:3px;font-size:13px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.4px;padding:9px 12px;background:var(--bg);border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
.clock-card{background:linear-gradient(135deg,#4F46E5 0%,#7C3AED 100%);border-radius:14px;padding:24px;color:white;text-align:center;margin-bottom:15px}
.clock-time{font-size:42px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.clock-date{font-size:13px;opacity:.8;margin-bottom:16px}
.clock-status{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.15);padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;margin-bottom:16px}
.clock-dot{width:7px;height:7px;border-radius:50%}
.clock-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.cbtn{padding:10px 22px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.cbtn:hover:not(:disabled){transform:scale(1.03)}
.cbtn-in{background:white;color:var(--p)}
.cbtn-out{background:rgba(255,255,255,.2);color:white;border:2px solid rgba(255,255,255,.4)}
.cbtn:disabled{opacity:.5;cursor:not-allowed}
.qa{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:17px}
.qa-btn{display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:8px;border:1.5px solid var(--bd);background:white;font-size:13px;font-weight:500;cursor:pointer;color:var(--tx);transition:all .15s}
.qa-btn:hover{border-color:var(--p);color:var(--p);background:var(--pl)}
.payslip-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13px}
.payslip-row:last-child{border-bottom:none}
.empty{text-align:center;padding:28px;color:var(--tl)}
.empty i{font-size:26px;margin-bottom:8px;display:block;opacity:.4}
.loading{text-align:center;padding:32px;color:var(--tm)}
.well-survey .qi{padding:12px 0;border-bottom:1px solid var(--bd)}
.well-survey .qi:last-child{border-bottom:none}
.well-survey .qt{font-size:13px;margin-bottom:8px}
.well-survey .rating{display:flex;gap:7px}
.well-survey .rating input{display:none}
.well-survey .rating label{width:32px;height:32px;border-radius:7px;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.well-survey .rating input:checked+label,.well-survey .rating label:hover{background:var(--p);border-color:var(--p);color:white}
.av32{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdh{text-align:center;font-size:10px;font-weight:700;color:var(--tm);padding:4px 0;text-transform:uppercase}
.cd{min-height:29px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px}
.cd.today{background:var(--p);color:white;font-weight:700}
.cd.hol{background:var(--erl);color:var(--er);font-weight:600}
.cd.wkd{color:var(--tl)}
.cd.lv{background:var(--wal);color:#92400E}
.profile-field{margin-bottom:14px}
.profile-field .pf-label{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.profile-field .pf-val{font-size:14px;font-weight:500}
#toast{position:fixed;bottom:20px;right:20px;background:var(--tx);color:white;padding:11px 17px;border-radius:9px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(80px);transition:transform .3s;box-shadow:0 4px 12px rgba(0,0,0,.2)}
#toast.show{transform:translateY(0)}
#toast.ok{background:var(--ok)}
#toast.wa{background:var(--wa)}
#toast.er{background:var(--er)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
@media(max-width:768px){.sb{width:0;overflow:hidden}.sg{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
  <div class="sb">
    <div class="sb-hd"><div class="sb-ico"><i class="fas fa-people-group"></i></div><span class="sb-title">PeopleCore</span></div>
    <div class="sb-user"><div class="av" id="sb-av" style="background:#4F46E5">--</div><div style="overflow:hidden"><div class="u-name" id="sb-name">Loading…</div><div class="u-role" id="sb-role">Employee</div></div></div>
    <nav class="sb-nav">
      <div class="nl">My Workspace</div>
      <div class="ni on" data-pg="dashboard"><i class="fas fa-house"></i>My Dashboard</div>
      <div class="ni" data-pg="attendance"><i class="fas fa-fingerprint"></i>My Attendance</div>
      <div class="ni" data-pg="leaves"><i class="fas fa-umbrella-beach"></i>My Leaves</div>
      <div class="nl">HR Services</div>
      <div class="ni" data-pg="payslip"><i class="fas fa-file-invoice-dollar"></i>Payslip</div>
      <div class="ni" data-pg="holidays"><i class="fas fa-calendar-days"></i>Holiday Calendar</div>
      <div class="ni" data-pg="wellbeing"><i class="fas fa-heart-pulse"></i>Wellbeing Check-in</div>
      <div class="ni" data-pg="announcements"><i class="fas fa-bullhorn"></i>Announcements</div>
      <div class="ni" data-pg="directory"><i class="fas fa-address-book"></i>Directory</div>
      <div class="ni" data-pg="myteam" id="nav-myteam" style="display:none"><i class="fas fa-users-gear"></i>My Team</div>
      <div class="nl">Account</div>
      <div class="ni" data-pg="profile"><i class="fas fa-user-circle"></i>My Profile</div>
    </nav>
    <div class="sb-ft"><div class="ni" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Sign out</div></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="tb-title" id="tb-title">My Dashboard</div>
      <div class="tb-right">
        <button class="lob" onclick="nav('profile')"><i class="fas fa-user"></i>My Profile</button>
        <button class="lob" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Sign out</button>
      </div>
    </div>
    <div class="ct" id="ct"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading…</div></div>
  </div>
</div>

<div class="mo" id="mo" onclick="if(event.target===this)closeMo()"><div class="md" id="md"></div></div>
<div id="toast"></div>

<script src="config.js"></script>
<script>
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let me=null,myLeaves=[],myBalances=[],allEmployees=[],holidays=[],companyOffs=[],myAttendance=[],myHolidayWork=[],myRegularisations=[],clockedIn=false,clockInTime=null,clockTimer=null,todayAtt=null;

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  const {data:emp}=await sb.from('employees').select('*').eq('user_id',session.user.id).single();
  if(!emp){await sb.auth.signOut();location.href='index.html';return;}
  if(['resigned','terminated','absconded','inactive'].includes(emp.status)){await sb.auth.signOut();location.href='index.html';return;}
  me=emp;
  setAv('sb-av',me.first_name,me.last_name,me.avatar_color);
  document.getElementById('sb-name').textContent=me.first_name+' '+me.last_name;
  document.getElementById('sb-role').textContent=me.designation||me.department||'Employee';
  await Promise.all([loadMyData(),loadHolidays(),loadAllEmp(),loadCompanyOffs()]);
  // Show My Team tab only for managers
  if(me.is_manager){
    const teamNav=document.getElementById('nav-myteam');
    if(teamNav)teamNav.style.display='flex';
  }
  document.querySelectorAll('.ni[data-pg]').forEach(el=>el.onclick=()=>nav(el.dataset.pg));
  nav('dashboard');
}

async function loadMyData(){
  const now=new Date();
  const today=now.toISOString().split('T')[0];
  const [l,b,a,ta,hw,rg]=await Promise.all([
    sb.from('leave_requests').select('*').eq('employee_id',me.id).order('created_at',{ascending:false}),
    sb.from('leave_balances').select('*').eq('employee_id',me.id).eq('year',now.getFullYear()),
    sb.from('attendance').select('*').eq('employee_id',me.id).order('date',{ascending:false}).limit(30),
    sb.from('attendance').select('*').eq('employee_id',me.id).eq('date',today).maybeSingle(),
    sb.from('holiday_work_requests').select('*').eq('employee_id',me.id).order('created_at',{ascending:false}),
    sb.from('regularisation_requests').select('*').eq('employee_id',me.id).order('created_at',{ascending:false}),
  ]);
  myLeaves=l.data||[];myBalances=b.data||[];myAttendance=a.data||[];
  todayAtt=ta.data||null;myHolidayWork=hw.data||[];myRegularisations=rg.data||[];
  if(todayAtt?.check_in&&!todayAtt?.check_out){
    clockedIn=true;clockInTime=new Date(todayAtt.check_in);
  } else {
    clockedIn=false;clockInTime=null;
  }
}
async function loadHolidays(){const {data}=await sb.from('holidays').select('*').order('date');holidays=data||[];}
async function loadCompanyOffs(){const {data}=await sb.from('company_offs').select('*').order('date');companyOffs=data||[];}
async function loadAllEmp(){const {data}=await sb.from('employees').select('id,first_name,last_name,email,phone,department,designation,avatar_color,status,manager_id,is_manager').neq('status','inactive').neq('status','terminated');allEmployees=data||[];}

function nav(pg){
  document.querySelectorAll('.ni[data-pg]').forEach(el=>el.classList.toggle('on',el.dataset.pg===pg));
  const titles={dashboard:'My Dashboard',attendance:'My Attendance',leaves:'My Leaves',payslip:'Payslip',holidays:'Holiday Calendar',wellbeing:'Wellbeing Check-in',announcements:'Announcements',directory:'Employee Directory',myteam:'My Team',profile:'My Profile'};
  document.getElementById('tb-title').textContent=titles[pg]||pg;
  clearInterval(clockTimer);
  document.getElementById('ct').innerHTML='<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading…</div>';
  ({dashboard:renderDashboard,attendance:renderAttendance,leaves:renderLeaves,payslip:renderPayslip,holidays:renderHolidays,wellbeing:renderWellbeing,announcements:renderAnnouncements,directory:renderDirectory,myteam:renderMyTeam,profile:renderProfile})[pg]?.();
}

// ─── DASHBOARD ───
async function renderDashboard(){
  const now=new Date();
  const yr=now.getFullYear(),mo=now.getMonth();
  // Calculate working days this month (exclude weekly off day)
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  let workingDays=0;
  for(let d=1;d<=Math.min(daysInMonth,now.getDate());d++){
    const dow=new Date(yr,mo,d).getDay();
    if(dow!==(me.weekly_off_day??0))workingDays++;
  }
  const present=myAttendance.filter(a=>a.status==='present').length;
  const halfDays=myAttendance.filter(a=>a.attendance_status==='half').length;
  const effectiveDays=present-(halfDays*0.5);
  const attPct=workingDays>0?Math.round((effectiveDays/workingDays)*100):0;
  const wfh=myAttendance.filter(a=>a.type==='WFH').length;
  const clBal=myBalances.find(b=>b.leave_type==='Casual Leave');
  const pending=myLeaves.filter(l=>l.status==='pending').length+myRegularisations.filter(r=>r.status==='pending').length;
  document.getElementById('ct').innerHTML=`
  <div class="ph"><div><h2>Welcome back, ${me.first_name} 👋</h2><p>${now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</p></div></div>
  <div class="qa">
    <button class="qa-btn" onclick="nav('attendance')"><i class="fas fa-fingerprint"></i> Mark Attendance</button>
    <button class="qa-btn" onclick="openLeaveModal('Casual Leave')"><i class="fas fa-umbrella-beach"></i> Apply Leave</button>
    <button class="qa-btn" onclick="openLeaveModal('Work From Home')"><i class="fas fa-house-laptop"></i> WFH Request</button>
    <button class="qa-btn" onclick="openLeaveModal('Comp Off')"><i class="fas fa-arrows-rotate"></i> Comp Off</button>
    <button class="qa-btn" onclick="openRegularisationModal()"><i class="fas fa-clock-rotate-left"></i> Regularise</button>
    <button class="qa-btn" onclick="nav('payslip')"><i class="fas fa-file-invoice-dollar"></i> View Payslip</button>
  </div>
  <div class="sg">
    <div class="sc g"><div class="sl">Attendance</div><div class="sv">${attPct}%</div><div class="ss">${effectiveDays}/${workingDays} working days</div><div class="si"><i class="fas fa-calendar-check"></i></div></div>
    <div class="sc b"><div class="sl">CL Balance</div><div class="sv">${clBal?(clBal.total_days-clBal.used_days):'—'}</div><div class="ss">Casual days left</div><div class="si"><i class="fas fa-umbrella-beach"></i></div></div>
    <div class="sc a"><div class="sl">Pending</div><div class="sv">${pending}</div><div class="ss">Awaiting approval</div><div class="si"><i class="fas fa-hourglass-half"></i></div></div>
    <div class="sc r"><div class="sl">WFH Days</div><div class="sv">${wfh}</div><div class="ss">This month</div><div class="si"><i class="fas fa-house-laptop"></i></div></div>
  </div>
  <div class="g2">
    <div>
      <div class="clock-card" id="clock-card">
        <div class="clock-time" id="clk">--:--:--</div>
        <div class="clock-date">${now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>

// ─── CLOCK ───
function startClock(){
  function tick(){const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});['clk','clk2'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t;});}
  tick();clearInterval(clockTimer);clockTimer=setInterval(tick,1000);
}

async function clockAction(btnId,dotId,txtId){
  const today=new Date().toISOString().split('T')[0];
  const todayDow=new Date().getDay(); // 0=Sun, 1=Mon...
  const btn=document.getElementById(btnId);
  const dot=document.getElementById(dotId);
  const txt=document.getElementById(txtId);
  if(btn)btn.disabled=true;

  // Check if today is employee's weekly off or a company off
  const isWeeklyOff=me.weekly_off_day!==undefined&&me.weekly_off_day!==null&&todayDow===me.weekly_off_day;
  const todayHoliday=holidays.find(h=>h.date===today);
  const compOff=companyOffs.find(c=>c.date===today);
  const isSpecialDay=isWeeklyOff||todayHoliday||compOff;
  const specialDayName=isWeeklyOff?'your weekly off day':todayHoliday?todayHoliday.name:compOff?.name;

  if(!clockedIn){
    const now=new Date();
    const {error}=await sb.from('attendance').upsert({employee_id:me.id,date:today,check_in:now.toISOString(),status:'present',type:'Office'},{onConflict:'employee_id,date'});
    if(error){toast('Error: '+error.message,'er');if(btn)btn.disabled=false;return;}
    clockedIn=true;clockInTime=now;
    if(btn){btn.textContent='Clock Out';btn.className='cbtn cbtn-out';}
    if(dot)dot.style.background='#F59E0B';
    if(txt)txt.textContent='Clocked in at '+now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    if(isSpecialDay){
      toast(`⚠️ Today is ${specialDayName}. Your work will be auto-logged for Comp Off.`,'wa');
    } else {
      toast('Clocked in!','ok');
    }
  } else {
    const now=new Date();
    const hours=clockInTime?Math.round((now-clockInTime)/3600000*10)/10:0;
    // Determine attendance status based on hours
    const attStatus=hours>=9?'full':hours>=4.5?'half':'half';
    const {error}=await sb.from('attendance').update({
      check_out:now.toISOString(),
      hours_worked:hours,
      attendance_status:attStatus
    }).eq('employee_id',me.id).eq('date',today);
    if(error){toast('Error: '+error.message,'er');if(btn)btn.disabled=false;return;}
    clockedIn=false;clockInTime=null;
    if(btn){btn.textContent='Clock In';btn.className='cbtn cbtn-in';}
    if(dot)dot.style.background='#34D399';
    if(txt)txt.textContent='Not clocked in';

    // Auto-create comp off request if worked on weekly off, holiday or company off
    if(isSpecialDay){
      const alreadySubmitted=myHolidayWork.find(h=>h.holiday_date===today);
      if(!alreadySubmitted){
        const holId=todayHoliday?.id||null;
        await sb.from('holiday_work_requests').insert({
          employee_id:me.id,
          holiday_id:holId,
          holiday_date:today,
          holiday_name:specialDayName,
          hours_worked:hours,
          reason:isWeeklyOff?'Worked on weekly off day':compOff?'Worked on company off day':'Auto-detected from attendance',
          benefit_type:'comp_off',
          status:'pending'
        });
        toast(`Clocked out · ${hours}h logged · Comp Off request auto-submitted for working on ${specialDayName}.`,'ok');
      } else {
        toast(`Clocked out · ${hours}h logged.`,'ok');
      }
    } else {
      toast(`Clocked out · ${hours}h logged`,'ok');
    }
    await loadMyData();
    if(document.getElementById('clk2'))renderAttendance();
  }
  if(btn)btn.disabled=false;
}

async function submitLeave(){
  const from=v('lf'),to=v('lt2'),lt=v('lt'),reason=v('lr');
  if(!from||!to){toast('Please select from and to dates','wa');return;}
  if(new Date(to)<new Date(from)){toast('To date must be on or after from date','wa');return;}
  setBtnLoad('submit-leave-btn',true,'Submitting…');
  const lopType=lt==='LOP (Loss of Pay)'?'LOP':lt;
  const days=Math.ceil((new Date(to)-new Date(from))/86400000)+1;
  // Check balance for non-LOP/non-special leaves
  if(!['LOP','Maternity Leave','Paternity Leave','Unpaid Leave','Sick Leave'].includes(lopType)){
    const bal=myBalances.find(b=>b.leave_type===lopType);
    if(bal&&(bal.total_days-bal.used_days)<days){
      toast(`Insufficient ${lopType} balance. ${bal.total_days-bal.used_days} days left. Consider applying LOP.`,'wa');
      setBtnLoad('submit-leave-btn',false,'Submit Request');return;
    }
  }
  const {error}=await sb.from('leave_requests').insert({employee_id:me.id,leave_type:lopType,from_date:from,to_date:to,days,reason,status:'pending'});
  if(error){toast('Error: '+error.message,'er');setBtnLoad('submit-leave-btn',false,'Submit Request');return;}
  closeMo();toast('Leave request submitted!','ok');
  await loadMyData();nav('leaves');
}

async function cancelLeave(id){
  const {error}=await sb.from('leave_requests').delete().eq('id',id).eq('status','pending');
  if(error){toast('Error: '+error.message,'er');return;}
  myLeaves=myLeaves.filter(l=>l.id!==id);
  toast('Leave request cancelled.','ok');renderLeaves();
}

async function submitWellbeing(){
  const get=name=>{const el=document.querySelector(`input[name="${name}"]:checked`);return el?parseInt(el.value):0;};
  const scores={mood_score:get('q1'),workload_score:get('q2'),team_score:get('q3'),balance_score:get('q4'),motivation_score:get('q5')};
  if(Object.values(scores).some(s=>!s)){toast('Please rate all 5 questions','wa');return;}
  setBtnLoad('submit-well-btn',true,'Submitting…');
  const now=new Date();
  const {error}=await sb.from('wellbeing_surveys').upsert({employee_id:me.id,month:now.getMonth()+1,year:now.getFullYear(),...scores,comments:v('wc')},{onConflict:'employee_id,month,year'});
  if(error){toast('Error: '+error.message,'er');setBtnLoad('submit-well-btn',false,'Submit Check-in');return;}
  toast('Thank you for your check-in! 💙','ok');
  nav('wellbeing');
}

function filterDir(){
  const q=(document.getElementById('dir-search')?.value||'').toLowerCase();
  const dept=(document.getElementById('dir-dept')?.value||'').toLowerCase();
  document.querySelectorAll('.dir-card').forEach(c=>{
    const match=c.dataset.name.includes(q)||c.dataset.dept.includes(q);
    const deptMatch=!dept||c.dataset.dept===dept;
    c.style.display=match&&deptMatch?'':'none';
  });
}

async function mgrActLeave(id,status,empId,leaveType,days,isPaid){
  const {error}=await sb.from('leave_requests').update({status,approved_by:me.id,approved_at:new Date().toISOString()}).eq('id',id);
  if(error){toast('Error: '+error.message,'er');return;}
  if(status==='approved'&&!isPaid){
    const {data:bal}=await sb.from('leave_balances').select('*').eq('employee_id',empId).eq('leave_type',leaveType).eq('year',new Date().getFullYear()).maybeSingle();
    if(bal){await sb.from('leave_balances').update({used_days:(bal.used_days||0)+parseInt(days)}).eq('id',bal.id);}
  }
  toast(isPaid?'Approved as paid leave — no salary deduction.':'Leave '+status+'!','ok');
  renderMyTeam();
}

async function changePassword(){
  const newPw=v('cp-new'),newPw2=v('cp-new2');
  if(!newPw||!newPw2){toast('Fill both password fields','wa');return;}
  if(newPw.length<8){toast('Password must be at least 8 characters','wa');return;}
  if(newPw!==newPw2){toast('Passwords do not match','wa');return;}
  setBtnLoad('change-pw-btn',true,'Updating…');
  const {error}=await sb.auth.updateUser({password:newPw});
  if(error){toast('Error: '+error.message,'er');setBtnLoad('change-pw-btn',false,'Update Password');return;}
  document.getElementById('cp-new').value='';
  document.getElementById('cp-new2').value='';
  toast('Password changed! Redirecting to login…','ok');
  setTimeout(async()=>{await sb.auth.signOut();location.href='index.html';},2000);
}

function openRegularisationModal(){

async function submitRegularisation(){
  const date=v('rg-dt'),ci=v('rg-ci'),co=v('rg-co'),reason=v('rg-rs');
  if(!date||!ci||!co||!reason){toast('Fill all fields','wa');return;}
  if(co<=ci){toast('Check-out must be after check-in','wa');return;}
  // Check not already regularised for this date
  const already=myRegularisations.find(r=>r.date===date);
  if(already){toast('Already submitted a regularisation for this date','wa');return;}
  setBtnLoad('submit-rg-btn',true,'Submitting…');
  const {error}=await sb.from('regularisation_requests').insert({
    employee_id:me.id,date,
    requested_check_in:ci,
    requested_check_out:co,
    reason,status:'pending'
  });
  if(error){toast('Error: '+error.message,'er');setBtnLoad('submit-rg-btn',false,'Submit for Approval');return;}
  closeMo();toast('Regularisation request submitted for admin approval.','ok');
  await loadMyData();renderAttendance();
}

// ─── HELPERS ───
function buildCal(){
  const now=new Date();const year=now.getFullYear(),month=now.getMonth();
  const hDates=holidays.filter(h=>{const d=new Date(h.date+'T00:00:00');return d.getFullYear()===year&&d.getMonth()===month;}).map(h=>new Date(h.date+'T00:00:00').getDate());
  const lDates=myLeaves.filter(l=>l.status==='approved').flatMap(l=>{
    const dates=[];let d=new Date(l.from_date+'T00:00:00');const end=new Date(l.to_date+'T00:00:00');
    while(d<=end){if(d.getFullYear()===year&&d.getMonth()===month)dates.push(d.getDate());d=new Date(d.getTime()+86400000);}
    return dates;
  });
  const first=new Date(year,month,1).getDay();const days=new Date(year,month+1,0).getDate();
  let html=`<div class="cal-grid">`;
  ['S','M','T','W','T','F','S'].forEach(d=>html+=`<div class="cdh">${d}</div>`);
  for(let i=0;i<first;i++)html+=`<div class="cd"></div>`;
  for(let d=1;d<=days;d++){
    const isToday=now.getDate()===d;const isHol=hDates.includes(d);const isLv=lDates.includes(d);
    const dow=new Date(year,month,d).getDay();const isWknd=dow===0||dow===6;
    html+=`<div class="cd${isToday?' today':isLv?' lv':isHol?' hol':isWknd?' wkd':''}">${d}</div>`;
  }
  return html+'</div><div style="display:flex;gap:10px;margin-top:8px;font-size:11px;flex-wrap:wrap"><div style="display:flex;align-items:center;gap:4px"><div style="width:9px;height:9px;border-radius:50%;background:var(--p)"></div>Today</div><div style="display:flex;align-items:center;gap:4px"><div style="width:9px;height:9px;border-radius:50%;background:var(--wal)"></div>Leave</div><div style="display:flex;align-items:center;gap:4px"><div style="width:9px;height:9px;border-radius:50%;background:var(--erl)"></div>Holiday</div></div>';
}

function ini(fn,ln){return((fn||'?')[0]+(ln||'')[0]).toUpperCase();}
function fd(d){if(!d)return'-';return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function setAv(id,fn,ln,color){const el=document.getElementById(id);if(el){el.textContent=ini(fn,ln);if(color)el.style.background=color;}}
function tpw(id,el){const i=document.getElementById(id);if(i){i.type=i.type==='password'?'text':'password';el.textContent=i.type==='password'?'👁':'🙈';}}
function closeMo(){document.getElementById('mo').classList.remove('op');}
function setBtnLoad(id,loading,txt){const b=document.getElementById(id);if(b){b.disabled=loading;b.innerHTML=loading?`<i class="fas fa-spinner fa-spin"></i> ${txt}`:txt;}}
let toastT;
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className=`show${type?' '+type:''}`;clearTimeout(toastT);toastT=setTimeout(()=>t.className='',3500);}
async function logout(){clearInterval(clockTimer);await sb.auth.signOut();location.href='index.html';}

init();
</script>

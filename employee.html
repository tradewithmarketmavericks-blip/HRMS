<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeopleCore — My Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--p:#4F46E5;--pl:#EEF2FF;--pd:#3730A3;--ok:#10B981;--okl:#D1FAE5;--wa:#F59E0B;--wal:#FEF3C7;--er:#EF4444;--erl:#FEE2E2;--bg:#F8FAFC;--sf:#fff;--sb:#1E1B4B;--sbt:#C7D2FE;--sbh:#312E81;--tx:#1E293B;--tm:#64748B;--tl:#94A3B8;--bd:#E2E8F0;--r:9px;--sh:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}
.shell{display:flex;height:100vh;overflow:hidden}
.sb{width:230px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{padding:16px 15px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.sb-ico{width:32px;height:32px;background:var(--p);border-radius:7px;display:flex;align-items:center;justify-content:center}
.sb-ico i{color:white;font-size:14px}
.sb-title{color:white;font-weight:700;font-size:14px}
.sb-user{padding:12px 15px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0}
.u-name{color:white;font-size:13px;font-weight:600}
.u-role{color:var(--sbt);font-size:11px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nl{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;padding:8px 10px 3px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:7px;cursor:pointer;color:var(--sbt);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px}
.ni:hover{background:var(--sbh);color:white}
.ni.on{background:var(--p);color:white}
.ni i{width:17px;text-align:center;font-size:13px}
.sb-ft{padding:10px 8px;border-top:1px solid rgba(255,255,255,.08)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:white;border-bottom:1px solid var(--bd);padding:0 22px;height:57px;display:flex;align-items:center;gap:14px;box-shadow:var(--sh);flex-shrink:0}
.tb-title{font-size:15px;font-weight:700}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.lob{padding:7px 13px;border:1px solid var(--bd);border-radius:7px;background:white;color:var(--tm);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px}
.ct{flex:1;overflow-y:auto;padding:22px}
.card{background:white;border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh)}
.ch{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ct2{padding:18px}
.ctitle{font-size:14px;font-weight:700}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.sc{background:white;border-radius:var(--r);padding:18px;border:1px solid var(--bd);position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.sc.b::before{background:var(--p)}.sc.g::before{background:var(--ok)}.sc.a::before{background:var(--wa)}.sc.r::before{background:var(--er)}
.sc .sl{font-size:11px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sc .sv{font-size:26px;font-weight:700;line-height:1;margin-bottom:5px}
.sc .ss{font-size:12px;color:var(--tl)}
.sc .si{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.sc.b .si{background:var(--pl);color:var(--p)}.sc.g .si{background:var(--okl);color:var(--ok)}.sc.a .si{background:var(--wal);color:var(--wa)}.sc.r .si{background:var(--erl);color:var(--er)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.bx{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.ok{background:var(--okl);color:#065F46}.wa{background:var(--wal);color:#92400E}.er{background:var(--erl);color:#991B1B}.pr{background:var(--pl);color:var(--pd)}.gy{background:#F1F5F9;color:#475569}.bl{background:#DBEAFE;color:#1D4ED8}.pu{background:#EDE9FE;color:#5B21B6}
.btn{padding:8px 15px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.bp{background:var(--p);color:white}.bp:hover{background:var(--pd)}
.bo{background:white;border:1px solid var(--bd);color:var(--tx)}.bo:hover{background:var(--bg)}
.bsm{padding:5px 9px;font-size:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.fr.f1{grid-template-columns:1fr}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--tm);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
input.i,select.i,textarea.i{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;color:var(--tx);outline:none;background:white;transition:border-color .2s;font-family:inherit}
input.i:focus,select.i:focus,textarea.i:focus{border-color:var(--p)}
textarea.i{resize:vertical;min-height:76px}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:1000;align-items:center;justify-content:center}
.mo.op{display:flex}
.md{background:white;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:540px;max-height:88vh;overflow-y:auto}
.mh{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1;border-radius:14px 14px 0 0}
.mt{font-size:15px;font-weight:700}
.mb2{padding:22px}
.mf{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:white}
.xb{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tm)}
.flex{display:flex;align-items:center}
.gap2{gap:8px}.gap3{gap:12px}
.mb4{margin-bottom:16px}.mb5{margin-bottom:20px}
.ri{padding:11px 0;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.ri:last-child{border-bottom:none}
.prog{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.pb{height:100%;border-radius:3px}
.lb{margin-bottom:12px}
.lbh{display:flex;justify-content:space-between;margin-bottom:3px;font-size:13px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;padding:9px 13px;background:var(--bg);border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
td{padding:11px 13px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
.clock-card{background:linear-gradient(135deg,#4F46E5 0%,#7C3AED 100%);border-radius:14px;padding:26px;color:white;text-align:center;margin-bottom:18px}
.clock-time{font-size:44px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.clock-date{font-size:13px;opacity:.8;margin-bottom:18px}
.clock-status{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.15);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;margin-bottom:18px}
.clock-dot{width:7px;height:7px;border-radius:50%}
.clock-btns{display:flex;gap:10px;justify-content:center}
.cbtn{padding:10px 24px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.cbtn:hover{transform:scale(1.03)}
.cbtn-in{background:white;color:var(--p)}
.cbtn-out{background:rgba(255,255,255,.2);color:white;border:2px solid rgba(255,255,255,.4)}
.qa{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px}
.qa-btn{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;border:1.5px solid var(--bd);background:white;font-size:13px;font-weight:500;cursor:pointer;color:var(--tx);transition:all .15s}
.qa-btn:hover{border-color:var(--p);color:var(--p);background:var(--pl)}
.qa-btn i{font-size:13px}
.payslip-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13px}
.payslip-row:last-child{border-bottom:none}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.ph h2{font-size:18px;font-weight:700}
.ph p{font-size:12px;color:var(--tm);margin-top:2px}
.empty{text-align:center;padding:32px;color:var(--tl)}
.empty i{font-size:28px;margin-bottom:8px;display:block;opacity:.4}
.loading{text-align:center;padding:32px;color:var(--tm)}
.well-survey .qi{padding:13px 0;border-bottom:1px solid var(--bd)}
.well-survey .qi:last-child{border-bottom:none}
.well-survey .qt{font-size:13px;margin-bottom:9px}
.well-survey .rating{display:flex;gap:7px}
.well-survey .rating input{display:none}
.well-survey .rating label{width:32px;height:32px;border-radius:7px;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.well-survey .rating input:checked+label,.well-survey .rating label:hover{background:var(--p);border-color:var(--p);color:white}
.av32{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdh{text-align:center;font-size:10px;font-weight:700;color:var(--tm);padding:5px 0;text-transform:uppercase}
.cd{min-height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:12px;cursor:default}
.cd.today{background:var(--p);color:white;font-weight:700}
.cd.hol{background:var(--erl);color:var(--er);font-weight:600}
.cd.wkd{color:var(--tl)}
.cd.lv{background:var(--wal);color:#92400E}
#toast{position:fixed;bottom:22px;right:22px;background:var(--tx);color:white;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(80px);transition:transform .3s;box-shadow:0 4px 12px rgba(0,0,0,.2)}
#toast.show{transform:translateY(0)}
#toast.ok{background:var(--ok)}
#toast.wa{background:var(--wa)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>
<body>
<div class="shell">
  <div class="sb">
    <div class="sb-hd"><div class="sb-ico"><i class="fas fa-people-group"></i></div><span class="sb-title">PeopleCore</span></div>
    <div class="sb-user">
      <div class="av" id="sb-av" style="background:#4F46E5">--</div>
      <div><div class="u-name" id="sb-name">Loading…</div><div class="u-role" id="sb-role">Employee</div></div>
    </div>
    <nav class="sb-nav">
      <div class="nl">My Workspace</div>
      <div class="ni on" data-pg="dashboard"><i class="fas fa-house"></i>My Dashboard</div>
      <div class="ni" data-pg="attendance"><i class="fas fa-fingerprint"></i>My Attendance</div>
      <div class="ni" data-pg="leaves"><i class="fas fa-umbrella-beach"></i>My Leaves</div>
      <div class="nl">HR Services</div>
      <div class="ni" data-pg="payslip"><i class="fas fa-file-invoice-dollar"></i>Payslip</div>
      <div class="ni" data-pg="wellbeing"><i class="fas fa-heart-pulse"></i>Wellbeing Check-in</div>
      <div class="ni" data-pg="announcements"><i class="fas fa-bullhorn"></i>Announcements</div>
      <div class="ni" data-pg="directory"><i class="fas fa-address-book"></i>Directory</div>
    </nav>
    <div class="sb-ft">
      <div class="ni" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Sign out</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="tb-title" id="tb-title">My Dashboard</div>
      <div class="tb-right">
        <button class="lob" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Sign out</button>
      </div>
    </div>
    <div class="ct" id="ct">
      <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading…</div>
    </div>
  </div>
</div>

<div class="mo" id="mo" onclick="if(event.target===this)closeMo()"><div class="md" id="md"></div></div>
<div id="toast"></div>

<script src="config.js"></script>
<script>
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let me=null,myLeaves=[],myBalances=[],allEmployees=[],holidays=[],clockedIn=false,clockInTime=null,clockTimer=null,myAttendance=[];
const COLORS=['#4F46E5','#7C3AED','#059669','#DC2626','#D97706','#0891B2','#0F766E','#9333EA','#BE185D'];

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  const {data:emp}=await sb.from('employees').select('*').eq('user_id',session.user.id).single();
  if(!emp){location.href='index.html';return;}
  me=emp;
  document.getElementById('sb-av').textContent=ini(me.first_name,me.last_name);
  document.getElementById('sb-av').style.background=me.avatar_color||'#4F46E5';
  document.getElementById('sb-name').textContent=me.first_name+' '+me.last_name;
  document.getElementById('sb-role').textContent=me.designation||me.department||'Employee';
  await Promise.all([loadMyData(),loadHolidays(),loadAllEmployees()]);
  document.querySelectorAll('.ni[data-pg]').forEach(el=>el.onclick=()=>nav(el.dataset.pg));
  nav('dashboard');
}

async function loadMyData(){
  const now=new Date();
  const [l,b,a]=await Promise.all([
    sb.from('leave_requests').select('*').eq('employee_id',me.id).order('created_at',{ascending:false}),
    sb.from('leave_balances').select('*').eq('employee_id',me.id).eq('year',now.getFullYear()),
    sb.from('attendance').select('*').eq('employee_id',me.id).order('date',{ascending:false}).limit(30),
  ]);
  myLeaves=l.data||[];
  myBalances=b.data||[];
  myAttendance=a.data||[];
}
async function loadHolidays(){
  const {data}=await sb.from('holidays').select('*').order('date');
  holidays=data||[];
}
async function loadAllEmployees(){
  const {data}=await sb.from('employees').select('first_name,last_name,email,phone,department,designation,avatar_color,status').eq('status','active');
  allEmployees=data||[];
}

function nav(pg){
  document.querySelectorAll('.ni[data-pg]').forEach(el=>el.classList.toggle('on',el.dataset.pg===pg));
  const titles={dashboard:'My Dashboard',attendance:'My Attendance',leaves:'My Leaves',payslip:'Payslip',wellbeing:'Wellbeing Check-in',announcements:'Announcements',directory:'Employee Directory'};
  document.getElementById('tb-title').textContent=titles[pg]||pg;
  const ct=document.getElementById('ct');
  ct.innerHTML='<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading…</div>';
  const renders={dashboard:renderDashboard,attendance:renderAttendance,leaves:renderLeaves,payslip:renderPayslip,wellbeing:renderWellbeing,announcements:renderAnnouncements,directory:renderDirectory};
  if(renders[pg])renders[pg]();
}

// ─── DASHBOARD ───
async function renderDashboard(){
  const today=new Date().toISOString().split('T')[0];
  const present=myAttendance.filter(a=>a.status==='present').length;
  const totalDays=myAttendance.length||1;
  const wfhCount=myAttendance.filter(a=>a.type==='WFH').length;
  const annualBal=myBalances.find(b=>b.leave_type==='Annual Leave');
  const pendingLeaves=myLeaves.filter(l=>l.status==='pending').length;

  document.getElementById('ct').innerHTML=`
  <div class="ph"><div><h2>Welcome back, ${me.first_name} 👋</h2><p>${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</p></div></div>
  <div class="qa">
    <button class="qa-btn" onclick="clockAction()"><i class="fas fa-fingerprint"></i> Mark Attendance</button>
    <button class="qa-btn" onclick="openLeaveModal('Annual Leave')"><i class="fas fa-umbrella-beach"></i> Apply Leave</button>
    <button class="qa-btn" onclick="openLeaveModal('Work From Home')"><i class="fas fa-house-laptop"></i> Request WFH</button>
    <button class="qa-btn" onclick="openLeaveModal('Comp Off')"><i class="fas fa-arrows-rotate"></i> Comp Off</button>
  </div>
  <div class="sg">
    <div class="sc g"><div class="sl">Attendance</div><div class="sv">${Math.round((present/totalDays)*100)}%</div><div class="ss">This month</div><div class="si"><i class="fas fa-calendar-check"></i></div></div>
    <div class="sc b"><div class="sl">Leave Balance</div><div class="sv">${annualBal?(annualBal.total_days-annualBal.used_days):'—'}</div><div class="ss">Annual days left</div><div class="si"><i class="fas fa-umbrella-beach"></i></div></div>
    <div class="sc a"><div class="sl">Pending Requests</div><div class="sv">${pendingLeaves}</div><div class="ss">Awaiting approval</div><div class="si"><i class="fas fa-hourglass-half"></i></div></div>
    <div class="sc r"><div class="sl">WFH Days</div><div class="sv">${wfhCount}</div><div class="ss">This month</div><div class="si"><i class="fas fa-house-laptop"></i></div></div>
  </div>
  <div class="g2">
    <div>
      <div class="clock-card">
        <div class="clock-time" id="clk">--:--:--</div>
        <div class="clock-date">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
        <div class="clock-status"><div class="clock-dot" id="clk-dot" style="background:#34D399"></div><span id="clk-txt">Not clocked in</span></div>
        <div class="clock-btns">
          <button class="cbtn cbtn-in" id="clk-btn" onclick="clockAction()">Clock In</button>
        </div>
      </div>
      <div class="card"><div class="ch"><span class="ctitle">Leave Balances</span></div><div class="ct2">
        ${myBalances.length?myBalances.map(b=>{
          const used=b.used_days||0,total=b.total_days||0;
          const pct=total>0?Math.round((used/total)*100):0;
          return `<div class="lb"><div class="lbh"><strong>${b.leave_type}</strong><span>${total-used} / ${total} days left</span></div><div class="prog"><div class="pb" style="width:${pct}%;background:var(--p)"></div></div></div>`;
        }).join(''):'<div class="empty"><i class="fas fa-inbox"></i>No balance data. Contact admin.</div>'}
      </div></div>
    </div>
    <div class="card"><div class="ch"><span class="ctitle">Recent Requests</span></div><div class="ct2">
      ${myLeaves.length?myLeaves.slice(0,6).map(l=>`
      <div class="ri"><div>
        <div style="font-size:13px;font-weight:600">${l.leave_type}</div>
        <div style="font-size:12px;color:var(--tm)">${fmtDate(l.from_date)}${l.to_date!==l.from_date?' → '+fmtDate(l.to_date):''} · ${l.days} day(s)</div>
        ${l.reason?`<div style="font-size:12px;color:var(--tl)">${l.reason}</div>`:''}
      </div><span class="bx ${l.status==='approved'?'ok':l.status==='pending'?'wa':'er'}">${l.status}</span></div>`).join(''):'<div class="empty"><i class="fas fa-inbox"></i>No requests yet</div>'}
    </div></div>
  </div>`;
  startClock();
}

// ─── CLOCK ───
function startClock(){
  function tick(){
    const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    const el=document.getElementById('clk');if(el)el.textContent=t;
    else clearInterval(clockTimer);
  }
  tick();clearInterval(clockTimer);clockTimer=setInterval(tick,1000);
}

async function clockAction(){
  const today=new Date().toISOString().split('T')[0];
  const existing=myAttendance.find(a=>a.date===today);
  if(!clockedIn&&!existing?.check_in){
    clockedIn=true;clockInTime=new Date();
    const {error}=await sb.from('attendance').upsert({employee_id:me.id,date:today,check_in:clockInTime.toISOString(),status:'present',type:'Office'},{onConflict:'employee_id,date'});
    if(error){toast('Error: '+error.message,'er');clockedIn=false;return;}
    const dot=document.getElementById('clk-dot'),txt=document.getElementById('clk-txt'),btn=document.getElementById('clk-btn');
    if(dot)dot.style.background='#F59E0B';
    if(txt)txt.textContent='Clocked in at '+clockInTime.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    if(btn){btn.textContent='Clock Out';btn.className='cbtn cbtn-out';}
    toast('Clocked in at '+clockInTime.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),'ok');
  } else if(clockedIn){
    const out=new Date();
    const hours=clockInTime?Math.round((out-clockInTime)/3600000*10)/10:0;
    const {error}=await sb.from('attendance').update({check_out:out.toISOString(),hours_worked:hours}).eq('employee_id',me.id).eq('date',today);
    if(error){toast('Error: '+error.message,'er');return;}
    clockedIn=false;
    const dot=document.getElementById('clk-dot'),txt=document.getElementById('clk-txt'),btn=document.getElementById('clk-btn');
    if(dot)dot.style.background='#34D399';
    if(txt)txt.textContent='Not clocked in';
    if(btn){btn.textContent='Clock In';btn.className='cbtn cbtn-in';}
    toast(`Clocked out · ${hours}h logged`,'ok');
    await loadMyData();
  } else {
    toast('Already clocked in today. Contact admin to edit.','wa');
  }
}

function openLeaveModal(type='Annual Leave'){

async function submitLeave(){
  const from=v('lf'),to=v('lt2'),lt=v('lt'),reason=v('lr');
  if(!from||!to){toast('Select from and to dates','wa');return;}
  if(new Date(to)<new Date(from)){toast('To date must be after from date','wa');return;}
  const days=Math.ceil((new Date(to)-new Date(from))/86400000)+1;
  const {error}=await sb.from('leave_requests').insert({employee_id:me.id,leave_type:lt,from_date:from,to_date:to,days,reason,status:'pending'});
  if(error){toast('Error: '+error.message,'er');return;}
  closeMo();toast('Leave request submitted!','ok');
  await loadMyData();nav('leaves');
}

// ─── HELPERS ───
function buildCal(){
  const now=new Date();const year=now.getFullYear(),month=now.getMonth();
  const hDates=holidays.filter(h=>{const d=new Date(h.date+'T00:00:00');return d.getFullYear()===year&&d.getMonth()===month;}).map(h=>new Date(h.date+'T00:00:00').getDate());
  const lDates=myLeaves.filter(l=>l.status==='approved').flatMap(l=>{const dates=[];let d=new Date(l.from_date+'T00:00:00');const end=new Date(l.to_date+'T00:00:00');while(d<=end){if(d.getFullYear()===year&&d.getMonth()===month)dates.push(d.getDate());d=new Date(d.getTime()+86400000);}return dates;});
  const first=new Date(year,month,1).getDay();const days=new Date(year,month+1,0).getDate();
  let html=`<div class="cal-grid">`;
  ['S','M','T','W','T','F','S'].forEach(d=>html+=`<div class="cdh">${d}</div>`);
  for(let i=0;i<first;i++)html+=`<div class="cd"></div>`;
  for(let d=1;d<=days;d++){
    const isToday=now.getDate()===d;const isHol=hDates.includes(d);const isLv=lDates.includes(d);
    const dow=new Date(year,month,d).getDay();const isWknd=dow===0||dow===6;
    html+=`<div class="cd${isToday?' today':isLv?' lv':isHol?' hol':isWknd?' wkd':''}">${d}</div>`;
  }
  return html+'</div><div style="display:flex;gap:12px;margin-top:10px;font-size:11px"><div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:50%;background:var(--p)"></div>Today</div><div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:50%;background:var(--wal);border:1px solid var(--wa)"></div>Leave</div><div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:50%;background:var(--erl);border:1px solid var(--er)"></div>Holiday</div></div>';
}

function ini(fn,ln){return((fn||'?')[0]+(ln||'')[0]).toUpperCase();}
function fmtDate(d){if(!d)return'-';return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function closeMo(){document.getElementById('mo').classList.remove('op');}
let toastT;
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className=`show${type?' '+type:''}`;clearTimeout(toastT);toastT=setTimeout(()=>t.className='',3200);}
async function logout(){await sb.auth.signOut();location.href='index.html';}

init();
</script>

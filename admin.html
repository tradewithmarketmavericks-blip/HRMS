<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeopleCore — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--p:#4F46E5;--pl:#EEF2FF;--pd:#3730A3;--ok:#10B981;--okl:#D1FAE5;--wa:#F59E0B;--wal:#FEF3C7;--er:#EF4444;--erl:#FEE2E2;--bg:#F8FAFC;--sb:#1E1B4B;--sbt:#C7D2FE;--sbh:#312E81;--tx:#1E293B;--tm:#64748B;--tl:#94A3B8;--bd:#E2E8F0;--r:9px;--sh:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}
.shell{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sb{width:235px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
.sb-hd{padding:16px 15px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.sb-ico{width:32px;height:32px;background:var(--p);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-ico i{color:white;font-size:14px}
.sb-title{color:white;font-weight:700;font-size:15px}
.sb-user{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0}
.u-name{color:white;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-role{color:var(--sbt);font-size:11px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nl{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;padding:8px 10px 3px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:7px;cursor:pointer;color:var(--sbt);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;white-space:nowrap}
.ni:hover{background:var(--sbh);color:white}
.ni.on{background:var(--p);color:white}
.ni i{width:17px;text-align:center;font-size:13px;flex-shrink:0}
.nb{margin-left:auto;background:var(--er);color:white;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-ft{padding:10px 8px;border-top:1px solid rgba(255,255,255,.08)}
/* TOPBAR */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:white;border-bottom:1px solid var(--bd);padding:0 20px;height:57px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;white-space:nowrap}
.tb-search{flex:1;max-width:280px;position:relative}
.tb-search input{width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;outline:none;background:var(--bg);color:var(--tx)}
.tb-search i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tl);font-size:12px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:9px}
.lob{padding:7px 12px;border:1px solid var(--bd);border-radius:7px;background:white;color:var(--tm);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px}
.lob:hover{background:var(--bg)}
/* CONTENT */
.ct{flex:1;overflow-y:auto;padding:20px}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
.sc{background:white;border-radius:var(--r);padding:17px;border:1px solid var(--bd);position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.sc.b::before{background:var(--p)}.sc.g::before{background:var(--ok)}.sc.a::before{background:var(--wa)}.sc.r::before{background:var(--er)}
.sc .sl{font-size:11px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.sc .sv{font-size:25px;font-weight:700;line-height:1;margin-bottom:4px}
.sc .ss{font-size:12px;color:var(--tl)}
.sc .si{position:absolute;right:13px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.sc.b .si{background:var(--pl);color:var(--p)}.sc.g .si{background:var(--okl);color:var(--ok)}.sc.a .si{background:var(--wal);color:var(--wa)}.sc.r .si{background:var(--erl);color:var(--er)}
/* CARD */
.card{background:white;border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh);margin-bottom:16px}
.ch{padding:13px 17px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ct2{padding:17px}
.ctitle{font-size:14px;font-weight:700}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.4px;padding:9px 12px;background:var(--bg);border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
tr:hover td{background:#FAFBFD}
tr:last-child td{border-bottom:none}
/* BADGE */
.bx{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.ok{background:var(--okl);color:#065F46}.wa{background:var(--wal);color:#92400E}.er{background:var(--erl);color:#991B1B}.pr{background:var(--pl);color:var(--pd)}.gy{background:#F1F5F9;color:#475569}.bl{background:#DBEAFE;color:#1D4ED8}.pu{background:#EDE9FE;color:#5B21B6}.cy{background:#CFFAFE;color:#0E7490}.pk{background:#FCE7F3;color:#9D174D}
/* BTN */
.btn{padding:8px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.bp{background:var(--p);color:white}.bp:hover{background:var(--pd)}
.bg2{background:var(--ok);color:white}.bg2:hover{opacity:.9}
.bd2{background:var(--er);color:white}.bd2:hover{opacity:.9}
.bwa{background:var(--wa);color:white}.bwa:hover{opacity:.9}
.bo{background:white;border:1px solid var(--bd);color:var(--tx)}.bo:hover{background:var(--bg)}
.bsm{padding:5px 9px;font-size:12px}
.bic{width:28px;height:28px;padding:0;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* FORM */
.fr{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.fr.f1{grid-template-columns:1fr}
.fr.f3{grid-template-columns:1fr 1fr 1fr}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--tm);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
input.i,select.i,textarea.i{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;color:var(--tx);outline:none;background:white;transition:border-color .2s;font-family:inherit}
input.i:focus,select.i:focus,textarea.i:focus{border-color:var(--p)}
textarea.i{resize:vertical;min-height:76px}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:36px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--tl);font-size:14px}
/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:16px}
.mo.op{display:flex}
.md{background:white;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:580px;max-height:90vh;overflow-y:auto}
.mh{padding:17px 21px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1;border-radius:14px 14px 0 0}
.mt{font-size:15px;font-weight:700}
.mb2{padding:21px}
.mf{padding:13px 21px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:9px;position:sticky;bottom:0;background:white;border-radius:0 0 14px 14px}
.xb{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tm);font-size:13px}
/* MISC */
.av32{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0}
.flex{display:flex;align-items:center}
.gap2{gap:8px}.gap3{gap:12px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.ph h2{font-size:18px;font-weight:700}
.ph p{font-size:12px;color:var(--tm);margin-top:2px}
.ri{padding:10px 0;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.ri:last-child{border-bottom:none}
.prog{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.pb{height:100%;border-radius:3px}
.lb{margin-bottom:12px}
.lbh{display:flex;justify-content:space-between;margin-bottom:3px;font-size:13px}
.empty{text-align:center;padding:32px;color:var(--tl)}
.empty i{font-size:28px;margin-bottom:8px;display:block;opacity:.4}
.loading{text-align:center;padding:40px;color:var(--tm)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdh{text-align:center;font-size:10px;font-weight:700;color:var(--tm);padding:5px 0;text-transform:uppercase}
.cd{min-height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;cursor:default}
.cd.today{background:var(--p);color:white;font-weight:700}
.cd.hol{background:var(--erl);color:var(--er);font-weight:600}
.cd.wkd{color:var(--tl)}
.payslip-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13px}
.payslip-row:last-child{border-bottom:none}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav button{background:none;border:1px solid var(--bd);border-radius:6px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tm)}
.cal-nav span{font-size:13px;font-weight:600}
.info-box{background:var(--wal);border-radius:8px;padding:11px;font-size:12px;color:#92400E;margin-top:8px}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center}
.confirm-overlay.op{display:flex}
.confirm-box{background:white;border-radius:12px;padding:28px;width:380px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.confirm-box h3{font-size:16px;font-weight:700;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--tm);margin-bottom:20px}
.confirm-actions{display:flex;gap:10px;justify-content:center}
#toast{position:fixed;bottom:20px;right:20px;background:var(--tx);color:white;padding:11px 17px;border-radius:9px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(80px);transition:transform .3s;box-shadow:0 4px 12px rgba(0,0,0,.2);max-width:320px}
#toast.show{transform:translateY(0)}
#toast.ok{background:var(--ok)}
#toast.wa{background:var(--wa)}
#toast.er{background:var(--er)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
@media(max-width:768px){.sb{width:0;overflow:hidden}.sg{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
  <div class="sb" id="sidebar">
    <div class="sb-hd"><div class="sb-ico"><i class="fas fa-people-group"></i></div><span class="sb-title">PeopleCore</span></div>
    <div class="sb-user"><div class="av" id="sb-av" style="background:#4F46E5">--</div><div><div class="u-name" id="sb-name">Loading…</div><div class="u-role">Admin</div></div></div>
    <nav class="sb-nav">
      <div class="nl">Overview</div>
      <div class="ni on" data-pg="dashboard"><i class="fas fa-house"></i>Dashboard</div>
      <div class="ni" data-pg="employees"><i class="fas fa-users"></i>Employees</div>
      <div class="nl">Time & Attendance</div>
      <div class="ni" data-pg="attendance"><i class="fas fa-fingerprint"></i>Attendance</div>
      <div class="ni" data-pg="leaves"><i class="fas fa-umbrella-beach"></i>Leave Management<span class="nb" id="leave-badge" style="display:none">0</span></div>
      <div class="nl">Finance</div>
      <div class="ni" data-pg="payroll"><i class="fas fa-money-bill-wave"></i>Payroll</div>
      <div class="ni" data-pg="incentives"><i class="fas fa-award"></i>Bonuses & Incentives</div>
      <div class="nl">Company</div>
      <div class="ni" data-pg="holidays"><i class="fas fa-calendar-days"></i>Holiday Calendar</div>
      <div class="ni" data-pg="departments"><i class="fas fa-sitemap"></i>Departments</div>
      <div class="nl">People</div>
      <div class="ni" data-pg="wellbeing"><i class="fas fa-heart-pulse"></i>Wellbeing</div>
      <div class="ni" data-pg="announcements"><i class="fas fa-bullhorn"></i>Announcements</div>
      <div class="ni" data-pg="reports"><i class="fas fa-chart-bar"></i>Reports</div>
    </nav>
    <div class="sb-ft"><div class="ni" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Sign out</div></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="tb-title" id="tb-title">Dashboard</div>
      <div class="tb-search"><i class="fas fa-search"></i><input id="search-inp" placeholder="Search employees…" oninput="searchEmp(this.value)"></div>
      <div class="tb-right">
        <button class="lob" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Sign out</button>
      </div>
    </div>
    <div class="ct" id="ct"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading…</div></div>
  </div>
</div>

<div class="mo" id="mo" onclick="if(event.target===this)closeMo()"><div class="md" id="md"></div></div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3 id="confirm-title">Are you sure?</h3>
    <p id="confirm-msg">This action cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn bo" onclick="closeConfirm()">Cancel</button>
      <button class="btn bd2" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="config.js"></script>
<script>
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let me=null,employees=[],departments=[],holidays=[],calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
const COLORS=['#4F46E5','#7C3AED','#059669','#DC2626','#D97706','#0891B2','#0F766E','#9333EA','#BE185D'];
const STATUS_COLORS={active:'ok','on-leave':'wa',inactive:'gy',resigned:'er',terminated:'er',absconded:'pk',probation:'cy'};

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  const {data:emp}=await sb.from('employees').select('*').eq('user_id',session.user.id).single();
  if(!emp||emp.role!=='admin'){await sb.auth.signOut();location.href='index.html';return;}
  me=emp;
  setAvatar('sb-av',me.first_name,me.last_name,me.avatar_color);
  document.getElementById('sb-name').textContent=me.first_name+' '+me.last_name;
  await Promise.all([loadEmployees(),loadDepartments(),loadHolidays()]);
  await updateBadge();
  document.querySelectorAll('.ni[data-pg]').forEach(el=>el.onclick=()=>navigate(el.dataset.pg));
  navigate('dashboard');
}

async function loadEmployees(){const {data}=await sb.from('employees').select('*').order('first_name');employees=data||[];}
async function loadDepartments(){const {data}=await sb.from('departments').select('*').order('name');departments=data||[];}
async function loadHolidays(){const {data}=await sb.from('holidays').select('*').order('date');holidays=data||[];}
async function updateBadge(){
  const {count}=await sb.from('leave_requests').select('id',{count:'exact',head:true}).eq('status','pending');
  const el=document.getElementById('leave-badge');
  if(el){el.textContent=count||0;el.style.display=(count&&count>0)?'inline':'none';}
}

function navigate(pg){
  document.querySelectorAll('.ni[data-pg]').forEach(el=>el.classList.toggle('on',el.dataset.pg===pg));
  const titles={dashboard:'Dashboard',employees:'Employees',attendance:'Attendance',leaves:'Leave Management',payroll:'Payroll',incentives:'Bonuses & Incentives',holidays:'Holiday Calendar',departments:'Departments',wellbeing:'Employee Wellbeing',announcements:'Announcements',reports:'Reports & Analytics'};
  document.getElementById('tb-title').textContent=titles[pg]||pg;
  document.getElementById('ct').innerHTML='<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading…</div>';
  ({dashboard:renderDashboard,employees:renderEmployees,attendance:renderAttendance,leaves:renderLeaves,payroll:renderPayroll,incentives:renderIncentives,holidays:renderHolidays,departments:renderDepartments,wellbeing:renderWellbeing,announcements:renderAnnouncements,reports:renderReports})[pg]?.();
}

// ─── DASHBOARD ───
async function renderDashboard(){
  const today=new Date().toISOString().split('T')[0];
  const [pendingLeaves,presentToday,recentLeaves,upcoming,anns]=await Promise.all([
    sb.from('leave_requests').select('id',{count:'exact',head:true}).eq('status','pending'),
    sb.from('attendance').select('id',{count:'exact',head:true}).eq('date',today).eq('status','present'),
    sb.from('leave_requests').select('*,employees(first_name,last_name,avatar_color,department)').eq('status','pending').limit(5).order('created_at',{ascending:false}),
    Promise.resolve(holidays.filter(h=>h.date>=today).slice(0,5)),
    sb.from('announcements').select('*').order('created_at',{ascending:false}).limit(3),
  ]);
  const active=employees.filter(e=>e.status==='active').length;
  document.getElementById('ct').innerHTML=`
  <div class="ph"><div><h2>Admin Dashboard</h2><p>${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p></div>
    <button class="btn bp" onclick="openAddEmployee()"><i class="fas fa-plus"></i> Add Employee</button></div>
  <div class="sg">
    <div class="sc b"><div class="sl">Total Employees</div><div class="sv">${active}</div><div class="ss">${employees.length} total incl. inactive</div><div class="si"><i class="fas fa-users"></i></div></div>
    <div class="sc g"><div class="sl">Present Today</div><div class="sv">${presentToday.count||0}</div><div class="ss">Clocked in</div><div class="si"><i class="fas fa-circle-check"></i></div></div>
    <div class="sc a"><div class="sl">Pending Leaves</div><div class="sv">${pendingLeaves.count||0}</div><div class="ss">Need approval</div><div class="si"><i class="fas fa-clock"></i></div></div>
    <div class="sc r"><div class="sl">Departments</div><div class="sv">${departments.length}</div><div class="ss">Teams</div><div class="si"><i class="fas fa-sitemap"></i></div></div>
  </div>
  <div class="g2">
    <div class="card"><div class="ch"><span class="ctitle">Pending Leave Requests</span></div><div class="ct2">
      ${recentLeaves.data&&recentLeaves.data.length?recentLeaves.data.map(l=>`
      <div class="ri"><div class="flex gap2">
        <div class="av32" style="background:${l.employees?.avatar_color||'#4F46E5'}">${ini(l.employees?.first_name,l.employees?.last_name)}</div>
        <div><div style="font-weight:600;font-size:13px">${l.employees?.first_name} ${l.employees?.last_name}</div>
        <div style="font-size:12px;color:var(--tm)">${l.leave_type} · ${l.days} day(s) · ${fd(l.from_date)}</div></div></div>
        <div class="flex gap2">
          <button class="btn bg2 bsm bic" onclick="actLeave('${l.id}','approved')" title="Approve"><i class="fas fa-check"></i></button>
          <button class="btn bd2 bsm bic" onclick="actLeave('${l.id}','rejected')" title="Reject"><i class="fas fa-times"></i></button>
        </div></div>`).join(''):'<div class="empty"><i class="fas fa-inbox"></i>No pending requests</div>'}
    </div></div>
    <div class="card"><div class="ch"><span class="ctitle">Upcoming Holidays</span></div><div class="ct2">
      ${upcoming.map(h=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)">
        <div style="text-align:center;min-width:40px;background:var(--pl);border-radius:7px;padding:4px">
          <div style="font-size:15px;font-weight:700;color:var(--p)">${new Date(h.date+'T00:00:00').getDate()}</div>
          <div style="font-size:9px;color:var(--p);text-transform:uppercase">${new Date(h.date+'T00:00:00').toLocaleString('default',{month:'short'})}</div>
        </div>
        <div><div style="font-size:13px;font-weight:600">${h.name}</div><span class="bx ${h.type==='National'?'pr':'pu'}">${h.type}</span></div>

function filterEmp(){
  const q=(document.getElementById('emp-search')?.value||'').toLowerCase();
  const dept=document.getElementById('dept-filter')?.value||'';
  const status=document.getElementById('status-filter')?.value||'';
  document.querySelectorAll('#emp-tbody tr').forEach(r=>{
    const txt=r.textContent.toLowerCase();
    const dMatch=!dept||r.dataset.dept===dept;
    const sMatch=!status||r.dataset.status===status;
    r.style.display=(txt.includes(q)&&dMatch&&sMatch)?'':'none';
  });
}

async function saveNewEmployee(){
  const fn=v('e-fn'),ln=v('e-ln'),em=v('e-em'),pw=v('e-pw'),ec=v('e-ec');
  if(!fn||!ln||!em||!ec){toast('Fill all required fields (*)','wa');return;}
  if(pw&&pw.length<8){toast('Password must be at least 8 characters','wa');return;}
  setBtnLoad('save-emp-btn',true,'Saving…');
  const color=COLORS[Math.floor(Math.random()*COLORS.length)];
  const {data:emp,error}=await sb.from('employees').insert({
    employee_code:ec,first_name:fn,last_name:ln,email:em,phone:v('e-ph'),
    department:v('e-dp'),designation:v('e-de'),date_of_joining:v('e-dj')||null,
    gross_salary:parseFloat(v('e-sl'))||0,role:v('e-rl'),status:v('e-st'),
    tax_amount:parseFloat(v('e-tx'))||0,avatar_color:color
  }).select().single();
  if(error){toast('Error: '+(error.code==='23505'?'Employee code or email already exists.':error.message),'er');setBtnLoad('save-emp-btn',false,'Add Employee');return;}
  // Seed leave balances
  await sb.from('leave_balances').insert([
    {employee_id:emp.id,leave_type:'Annual Leave',total_days:20,year:new Date().getFullYear()},
    {employee_id:emp.id,leave_type:'Sick Leave',total_days:10,year:new Date().getFullYear()},
    {employee_id:emp.id,leave_type:'Casual Leave',total_days:7,year:new Date().getFullYear()},
    {employee_id:emp.id,leave_type:'Comp Off',total_days:0,year:new Date().getFullYear()},
    {employee_id:emp.id,leave_type:'Work From Home',total_days:8,year:new Date().getFullYear()},
  ]);
  employees.push(emp);
  closeMo();toast(`${fn} ${ln} added! Remember to create their Supabase auth account.`,'ok');
  renderEmployees();
}

async function saveEditEmployee(id){
  const updates={first_name:v('ee-fn'),last_name:v('ee-ln'),email:v('ee-em'),phone:v('ee-ph'),department:v('ee-dp'),designation:v('ee-de'),gross_salary:parseFloat(v('ee-sl'))||0,tax_amount:parseFloat(v('ee-tx'))||0,status:v('ee-st'),role:v('ee-rl'),date_of_joining:v('ee-dj')||null};
  setBtnLoad('upd-emp-btn',true,'Saving…');
  const {error}=await sb.from('employees').update(updates).eq('id',id);
  if(error){toast('Error: '+error.message,'er');setBtnLoad('upd-emp-btn',false,'Save Changes');return;}
  const idx=employees.findIndex(x=>x.id===id);
  if(idx>-1)employees[idx]={...employees[idx],...updates};

async function saveAttendance(){
  const empId=v('a-emp'),date=v('a-dt');
  if(!empId||!date){toast('Select employee and date','wa');return;}
  setBtnLoad('save-att-btn',true,'Saving…');
  const ci=v('a-ci'),co=v('a-co');
  const ciTs=ci?`${date}T${ci}:00`:null;
  const coTs=co?`${date}T${co}:00`:null;
  const hours=ci&&co?Math.round((new Date(coTs)-new Date(ciTs))/3600000*10)/10:null;
  const {error}=await sb.from('attendance').upsert({employee_id:empId,date,type:v('a-tp'),status:v('a-st'),check_in:ciTs,check_out:coTs,hours_worked:hours},{onConflict:'employee_id,date'});
  if(error){toast('Error: '+error.message,'er');setBtnLoad('save-att-btn',false,'Save');return;}
  closeMo();toast('Attendance saved!','ok');renderAttendance();
}

function filterLeaves(){
  const q=(document.getElementById('leave-search')?.value||'').toLowerCase();
  const st=document.getElementById('leave-status-filter')?.value||'';
  const lt=document.getElementById('leave-type-filter')?.value||'';
  document.querySelectorAll('#leave-table tbody tr').forEach(r=>{
    const empMatch=!q||r.dataset.emp?.includes(q);
    const stMatch=!st||r.dataset.status===st;
    const ltMatch=!lt||r.dataset.type===lt;
    r.style.display=(empMatch&&stMatch&&ltMatch)?'':'none';
  });
}

async function actLeave(id,status,empId,leaveType,days){
  const {error}=await sb.from('leave_requests').update({status,approved_by:me.id,approved_at:new Date().toISOString()}).eq('id',id);
  if(error){toast('Error: '+error.message,'er');return;}
  // Auto-deduct leave balance if approved
  if(status==='approved'&&empId&&leaveType&&days){
    const {data:bal}=await sb.from('leave_balances').select('*').eq('employee_id',empId).eq('leave_type',leaveType).eq('year',new Date().getFullYear()).single();
    if(bal){await sb.from('leave_balances').update({used_days:(bal.used_days||0)+days}).eq('id',bal.id);}
  }
  const badge=document.getElementById('ls-'+id);
  const actions=document.getElementById('la-'+id);
  if(badge){badge.className=`bx ${status==='approved'?'ok':'er'}`;badge.textContent=status;}
  if(actions)actions.innerHTML='-';
  toast(`Leave ${status}!`,status==='approved'?'ok':'');
  await updateBadge();
}

function renderCalendar(){
  const label=new Date(calYear,calMonth).toLocaleString('default',{month:'long',year:'numeric'});
  const el=document.getElementById('cal-label');if(el)el.textContent=label;
  const body=document.getElementById('cal-body');if(!body)return;
  const hDates=holidays.filter(h=>{const d=new Date(h.date+'T00:00:00');return d.getFullYear()===calYear&&d.getMonth()===calMonth;}).map(h=>new Date(h.date+'T00:00:00').getDate());
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  let html=`<div class="cal-grid">`;
  ['S','M','T','W','T','F','S'].forEach(d=>html+=`<div class="cdh">${d}</div>`);
  for(let i=0;i<first;i++)html+=`<div class="cd"></div>`;
  for(let d=1;d<=days;d++){
    const isToday=today.getDate()===d&&today.getMonth()===calMonth&&today.getFullYear()===calYear;
    const isHol=hDates.includes(d);
    const dow=new Date(calYear,calMonth,d).getDay();
    const isWknd=dow===0||dow===6;
    const hol=isHol?holidays.find(h=>new Date(h.date+'T00:00:00').getDate()===d&&new Date(h.date+'T00:00:00').getMonth()===calMonth):null;
    html+=`<div class="cd${isToday?' today':isHol?' hol':isWknd?' wkd':''}" title="${hol?hol.name:''}">${d}</div>`;
  }
  body.innerHTML=html+'</div>';
}

function changeCalMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
  const label=document.getElementById('cal-label');
  if(label)label.textContent=new Date(calYear,calMonth).toLocaleString('default',{month:'long',year:'numeric'});
}

  if(error){toast(error.code==='23505'?'Holiday on this date already exists':'Error: '+error.message,'er');setBtnLoad('save-hol-btn',false,'Add');return;}
  holidays.push(data);holidays.sort((a,b)=>a.date.localeCompare(b.date));
  closeMo();toast('Holiday added!','ok');renderHolidays();
}

// ─── DEPARTMENTS ───
async function renderDepartments(){
  document.getElementById('ct').innerHTML=`
  <div class="ph"><div><h2>Departments</h2></div>
    <button class="btn bp" onclick="openAddDept()"><i class="fas fa-plus"></i> Add Department</button></div>
  <div class="g3">
    ${departments.map((d,i)=>{
      const count=employees.filter(e=>e.department===d.name&&['active','probation','on-leave'].includes(e.status)).length;
      const color=COLORS[i%COLORS.length];
      return `<div class="card" style="border-top:3px solid ${color}"><div class="ct2">
        <div style="width:38px;height:38px;border-radius:8px;background:${color}18;display:flex;align-items:center;justify-content:center;margin-bottom:10px"><i class="fas fa-sitemap" style="color:${color}"></i></div>
        <div style="font-size:14px;font-weight:700;margin-bottom:3px">${d.name}</div>
        ${d.head_name?`<div style="font-size:12px;color:var(--tm);margin-bottom:9px">Head: ${d.head_name}</div>`:'<div style="margin-bottom:9px"></div>'}
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span class="bx gy">${count} member${count!==1?'s':''}</span>
          <div class="flex gap2">
            <button class="btn bo bsm" onclick="editDept('${d.id}','${d.name}','${d.head_name||''}')">Edit</button>
            <button class="btn bd2 bsm bic" onclick="confirm2('Delete ${d.name}?','Employees in this department will not be deleted.',async()=>{await sb.from(\'departments\').delete().eq(\'id\',\'${d.id}\');departments=departments.filter(x=>x.id!==\'${d.id}\');toast(\'Deleted\',\'\');renderDepartments();})"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      </div></div>`;}).join('')}
    <div class="card" style="border:2px dashed var(--bd);cursor:pointer;min-height:140px;display:flex;align-items:center;justify-content:center" onclick="openAddDept()">
      <div style="text-align:center;color:var(--tm)"><i class="fas fa-plus" style="font-size:22px;display:block;margin-bottom:8px;opacity:.4"></i><div style="font-size:13px">Add Department</div></div>
    </div>
  </div>`;
}

function openAddDept(){
  document.getElementById('md').innerHTML=`
  <div class="mh"><span class="mt">Add Department</span><button class="xb" onclick="closeMo()"><i class="fas fa-times"></i></button></div>
  <div class="mb2">
    <div class="fr f1"><div><label class="lbl">Department Name</label><input class="i" id="d-nm" placeholder="e.g. Sales"></div></div>
    <div class="fr f1"><div><label class="lbl">Department Head</label><input class="i" id="d-hd" placeholder="Name of department head"></div></div>
  </div>
  <div class="mf"><button class="btn bo" onclick="closeMo()">Cancel</button><button class="btn bp" id="save-dept-btn" onclick="saveDept()">Add</button></div>`;
  document.getElementById('mo').classList.add('op');
}

async function saveDept(){
  const name=v('d-nm');if(!name){toast('Enter department name','wa');return;}
  setBtnLoad('save-dept-btn',true,'Saving…');
  const {data,error}=await sb.from('departments').insert({name,head_name:v('d-hd')}).select().single();
  if(error){toast(error.code==='23505'?'Department already exists':'Error: '+error.message,'er');setBtnLoad('save-dept-btn',false,'Add');return;}
  departments.push(data);closeMo();toast('Department added!','ok');renderDepartments();
}

async function editDept(id,name,head){
  document.getElementById('md').innerHTML=`
  <div class="mh"><span class="mt">Edit Department</span><button class="xb" onclick="closeMo()"><i class="fas fa-times"></i></button></div>
  <div class="mb2">
    <div class="fr f1"><div><label class="lbl">Department Name</label><input class="i" id="d-nm" value="${name}"></div></div>
    <div class="fr f1"><div><label class="lbl">Department Head</label><input class="i" id="d-hd" value="${head}"></div></div>
  </div>
  <div class="mf"><button class="btn bo" onclick="closeMo()">Cancel</button><button class="btn bp" id="upd-dept-btn" onclick="updateDept('${id}')">Save</button></div>`;
  document.getElementById('mo').classList.add('op');
}

async function updateDept(id){
  setBtnLoad('upd-dept-btn',true,'Saving…');
  const {error}=await sb.from('departments').update({name:v('d-nm'),head_name:v('d-hd')}).eq('id',id);
  if(error){toast('Error: '+error.message,'er');setBtnLoad('upd-dept-btn',false,'Save');return;}
  await loadDepartments();closeMo();toast('Updated!','ok');renderDepartments();
}

// ─── WELLBEING ───
async function renderWellbeing(){
  const {data:surveys}=await sb.from('wellbeing_surveys').select('*,employees(first_name,last_name,avatar_color)').order('created_at',{ascending:false});
  const avg=surveys&&surveys.length?Math.round(surveys.reduce((s,x)=>s+(x.overall_score||0),0)/surveys.length):0;
  document.getElementById('ct').innerHTML=`
  <div class="ph"><div><h2>Employee Wellbeing</h2></div></div>
  <div class="sg">
    <div class="sc g"><div class="sl">Avg Score</div><div class="sv">${avg}/100</div><div class="ss">Team wellbeing</div><div class="si"><i class="fas fa-heart"></i></div></div>
    <div class="sc b"><div class="sl">Responses</div><div class="sv">${surveys?surveys.length:0}</div><div class="ss">Total surveys</div><div class="si"><i class="fas fa-clipboard-list"></i></div></div>
    <div class="sc a"><div class="sl">Pending</div><div class="sv">${Math.max(0,employees.filter(e=>e.status==='active').length-(surveys?new Set(surveys.map(s=>s.employee_id)).size:0))}</div><div class="ss">No response</div><div class="si"><i class="fas fa-question"></i></div></div>
    <div class="sc r"><div class="sl">Low Scores</div><div class="sv">${surveys?surveys.filter(s=>(s.overall_score||0)<50).length:0}</div><div class="ss">Need attention</div><div class="si"><i class="fas fa-triangle-exclamation"></i></div></div>
  </div>
  <div class="card"><div class="ch"><span class="ctitle">Wellbeing Survey Results</span></div>
  <div class="tw"><table><thead><tr><th>Employee</th><th>Score</th><th>Mood</th><th>Workload</th><th>Team</th><th>Balance</th><th>Motivation</th><th>Period</th></tr></thead>
  <tbody>${surveys&&surveys.length?surveys.map(s=>{
    const score=s.overall_score||0;
    return `<tr><td><div class="flex gap2"><div class="av32" style="background:${s.employees?.avatar_color||'#4F46E5'}">${ini(s.employees?.first_name,s.employees?.last_name)}</div><span style="font-weight:600">${s.employees?.first_name} ${s.employees?.last_name}</span></div></td>
    <td><div class="flex gap2"><div class="prog" style="width:70px"><div class="pb" style="width:${score}%;background:${score>=70?'var(--ok)':score>=40?'var(--wa)':'var(--er)'}"></div></div><span style="font-weight:600">${score}</span></div></td>
    <td>${stars(s.mood_score)}</td><td>${stars(s.workload_score)}</td><td>${stars(s.team_score)}</td><td>${stars(s.balance_score)}</td><td>${stars(s.motivation_score)}</td>
    <td style="font-size:12px;color:var(--tm)">${s.month}/${s.year}</td></tr>`;}).join(''):'<tr><td colspan="8" class="empty">No survey responses yet</td></tr>'}</tbody></table></div></div>`;
}

// ─── ANNOUNCEMENTS ───

function openAddAnn(){

  <div class="mb2">
    <div class="fr f1"><div><label class="lbl">Title</label><input class="i" id="an-ti" placeholder="Announcement title"></div></div>

async function saveAnn(){
  const title=v('an-ti'),content=v('an-ct');
  if(!title||!content){toast('Fill title and content','wa');return;}

  closeMo();toast('Announcement posted!','ok');renderAnnouncements();
}

// ─── REPORTS ───
async function renderReports(){
  const active=employees.filter(e=>e.status==='active').length;
  const totalSalary=employees.filter(e=>e.status==='active').reduce((s,e)=>s+(e.gross_salary||0),0);
  const deptCounts=departments.map(d=>({name:d.name,count:employees.filter(e=>e.department===d.name&&e.status==='active').length})).filter(d=>d.count>0);
  const statusCounts=[{label:'Active',count:employees.filter(e=>e.status==='active').length,color:'var(--ok)'},{label:'On Leave',count:employees.filter(e=>e.status==='on-leave').length,color:'var(--wa)'},{label:'Probation',count:employees.filter(e=>e.status==='probation').length,color:'var(--p)'},{label:'Resigned/Terminated',count:employees.filter(e=>['resigned','terminated','absconded'].includes(e.status)).length,color:'var(--er)'}];
  document.getElementById('ct').innerHTML=`
  <div class="ph"><div><h2>Reports & Analytics</h2></div></div>
  <div class="sg">
    <div class="sc b"><div class="sl">Headcount</div><div class="sv">${active}</div><div class="ss">Active employees</div><div class="si"><i class="fas fa-users"></i></div></div>
    <div class="sc g"><div class="sl">Monthly Payroll</div><div class="sv">₹${(totalSalary/1000).toFixed(0)}K</div><div class="ss">Gross</div><div class="si"><i class="fas fa-money-bill-wave"></i></div></div>
    <div class="sc a"><div class="sl">Departments</div><div class="sv">${departments.length}</div><div class="ss">Teams</div><div class="si"><i class="fas fa-sitemap"></i></div></div>
    <div class="sc r"><div class="sl">Avg Salary</div><div class="sv">₹${active?Math.round(totalSalary/active).toLocaleString('en-IN'):'0'}</div><div class="ss">Per employee</div><div class="si"><i class="fas fa-chart-bar"></i></div></div>
  </div>
  <div class="g2">
    <div class="card"><div class="ch"><span class="ctitle">Headcount by Department</span></div><div class="ct2">
      ${deptCounts.map(d=>`<div class="lb"><div class="lbh"><strong>${d.name}</strong><span>${d.count}</span></div><div class="prog"><div class="pb" style="width:${Math.max(5,Math.round((d.count/active)*100))}%;background:var(--p)"></div></div></div>`).join('')||'<div class="empty">No data</div>'}
    </div></div>
    <div class="card"><div class="ch"><span class="ctitle">Status Breakdown</span></div><div class="ct2">
      ${statusCounts.filter(s=>s.count>0).map(s=>`<div class="lb"><div class="lbh"><strong>${s.label}</strong><span>${s.count}</span></div><div class="prog"><div class="pb" style="width:${Math.max(5,Math.round((s.count/employees.length)*100))}%;background:${s.color}"></div></div></div>`).join('')}
    </div></div>
  </div>
  <div class="card"><div class="ch"><span class="ctitle">Download Reports</span></div><div class="ct2">
    <div class="g2">${[
      {icon:'fas fa-users',label:'Employee Directory',color:'#4F46E5',fn:'empDir'},
      {icon:'fas fa-fingerprint',label:'Attendance Report',color:'#059669',fn:'attRep'},
      {icon:'fas fa-umbrella-beach',label:'Leave Summary',color:'#D97706',fn:'leaveRep'},
      {icon:'fas fa-money-bill',label:'Payroll Report',color:'#7C3AED',fn:'payRep'},
      {icon:'fas fa-award',label:'Incentives Report',color:'#DC2626',fn:'incRep'},
      {icon:'fas fa-sitemap',label:'Department Report',color:'#0891B2',fn:'deptRep'},
    ].map(r=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)">
      <div class="flex gap2"><i class="${r.icon}" style="color:${r.color};width:18px"></i><span>${r.label}</span></div>
      <button class="btn bo bsm" onclick="${r.fn}()"><i class="fas fa-download"></i> Download</button>
    </div>`).join('')}</div>
  </div></div>`;
}

function dlCSV(rows,filename){
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded!','ok');
}
function empDir(){dlCSV(['Code,Name,Email,Phone,Department,Designation,Joined,Salary,Status',...employees.map(e=>`${e.employee_code},"${e.first_name} ${e.last_name}",${e.email},${e.phone||''},${e.department||''},${e.designation||''},${e.date_of_joining||''},${e.gross_salary||0},${e.status||'active'}`)], 'employee_directory.csv');}
function payRep(){dlCSV(['Name,Code,Department,Gross Salary,PF (12%),TDS,Prof Tax,Net Pay',...employees.filter(e=>e.status==='active').map(e=>{const pf=Math.round((e.gross_salary||0)*0.12);return `"${e.first_name} ${e.last_name}",${e.employee_code},${e.department||''},${e.gross_salary||0},${pf},${e.tax_amount||0},200,${(e.gross_salary||0)-pf-(e.tax_amount||0)-200}`;})], 'payroll_report.csv');}
function deptRep(){dlCSV(['Department,Head,Active Employees',...departments.map(d=>`${d.name},${d.head_name||''},${employees.filter(e=>e.department===d.name&&e.status==='active').length}`)], 'department_report.csv');}
async function attRep(){const {data}=await sb.from('attendance').select('*,employees(first_name,last_name,employee_code)').order('date',{ascending:false}).limit(500);dlCSV(['Employee,Code,Date,Check In,Check Out,Hours,Type,Status',...(data||[]).map(a=>`"${a.employees?.first_name} ${a.employees?.last_name}",${a.employees?.employee_code},${a.date},${a.check_in?new Date(a.check_in).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'-'},${a.check_out?new Date(a.check_out).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'-'},${a.hours_worked||0},${a.type},${a.status}`)], 'attendance_report.csv');}
async function leaveRep(){const {data}=await sb.from('leave_requests').select('*,employees(first_name,last_name,employee_code)').order('created_at',{ascending:false});dlCSV(['Employee,Code,Leave Type,From,To,Days,Reason,Status',...(data||[]).map(l=>`"${l.employees?.first_name} ${l.employees?.last_name}",${l.employees?.employee_code},${l.leave_type},${l.from_date},${l.to_date},${l.days},"${l.reason||''}",${l.status}`)], 'leave_report.csv');}
async function incRep(){const {data}=await sb.from('incentives').select('*,employees(first_name,last_name,employee_code)').order('created_at',{ascending:false});dlCSV(['Employee,Code,Type,Amount,Period,Status',...(data||[]).map(i=>`"${i.employees?.first_name} ${i.employees?.last_name}",${i.employees?.employee_code},${i.type},${i.amount},${i.period||''},${i.status}`)], 'incentives_report.csv');}
function exportCSV(){empDir();}

// ─── HELPERS ───
function ini(fn,ln){return((fn||'?')[0]+(ln||'')[0]).toUpperCase();}
function fd(d){if(!d)return'-';return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function setAvatar(id,fn,ln,color){const el=document.getElementById(id);if(el){el.textContent=ini(fn,ln);if(color)el.style.background=color;}}
function stars(n){if(!n)return'<span style="color:var(--tl)">—</span>';return'★'.repeat(n)+'☆'.repeat(5-n);}
function tpw(id,el){const i=document.getElementById(id);if(i){i.type=i.type==='password'?'text':'password';el.textContent=i.type==='password'?'👁':'🙈';}}
function closeMo(){document.getElementById('mo').classList.remove('op');}
function setBtnLoad(id,loading,txt){const b=document.getElementById(id);if(b){b.disabled=loading;b.innerHTML=loading?`<i class="fas fa-spinner fa-spin"></i> ${txt}`:txt;}}
let toastT;
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className=`show${type?' '+type:''}`;clearTimeout(toastT);toastT=setTimeout(()=>t.className='',3500);}
async function logout(){await sb.auth.signOut();location.href='index.html';}

// Confirmation dialog
let confirmCb=null;
function confirm2(title,msg,cb,okTxt='Confirm',okCls='bd2'){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  const btn=document.getElementById('confirm-ok');
  btn.textContent=okTxt;btn.className=`btn ${okCls}`;
  confirmCb=cb;
  document.getElementById('confirm-overlay').classList.add('op');
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('op');confirmCb=null;}
document.getElementById('confirm-ok').onclick=()=>{closeConfirm();if(confirmCb)confirmCb();};

init();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeopleCore — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--p:#4F46E5;--pl:#EEF2FF;--pd:#3730A3;--s:#0EA5E9;--ok:#10B981;--okl:#D1FAE5;--wa:#F59E0B;--wal:#FEF3C7;--er:#EF4444;--erl:#FEE2E2;--bg:#F8FAFC;--sf:#fff;--sb:#1E1B4B;--sbt:#C7D2FE;--sbh:#312E81;--tx:#1E293B;--tm:#64748B;--tl:#94A3B8;--bd:#E2E8F0;--r:9px;--sh:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}
/* SHELL */
.shell{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sb{width:235px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-ico{width:34px;height:34px;background:var(--p);border-radius:8px;display:flex;align-items:center;justify-content:center}
.sb-ico i{color:white;font-size:15px}
.sb-title{color:white;font-weight:700;font-size:15px}
.sb-user{padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0}
.u-name{color:white;font-size:13px;font-weight:600}
.u-role{color:var(--sbt);font-size:11px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nl{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;padding:8px 10px 3px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:7px;cursor:pointer;color:var(--sbt);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px}
.ni:hover{background:var(--sbh);color:white}
.ni.on{background:var(--p);color:white}
.ni i{width:17px;text-align:center;font-size:13px}
.nb{margin-left:auto;background:var(--er);color:white;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-ft{padding:10px 8px;border-top:1px solid rgba(255,255,255,.08)}
/* TOPBAR */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:white;border-bottom:1px solid var(--bd);padding:0 22px;height:58px;display:flex;align-items:center;gap:14px;box-shadow:var(--sh);flex-shrink:0}
.tb-title{font-size:15px;font-weight:700}
.tb-search{flex:1;max-width:300px;position:relative}
.tb-search input{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;outline:none;background:var(--bg)}
.tb-search i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tl);font-size:12px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.ib{width:34px;height:34px;border-radius:8px;border:1px solid var(--bd);background:white;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tm);position:relative}
.nd{width:7px;height:7px;background:var(--er);border-radius:50%;position:absolute;top:6px;right:6px;border:2px solid white}
.lob{padding:7px 13px;border:1px solid var(--bd);border-radius:7px;background:white;color:var(--tm);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px}
/* CONTENT */
.ct{flex:1;overflow-y:auto;padding:22px}
/* PAGE */
.pg{display:none}.pg.on{display:block}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.ph h2{font-size:19px;font-weight:700}
.ph p{font-size:13px;color:var(--tm);margin-top:2px}
/* STAT GRID */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.sc{background:white;border-radius:var(--r);padding:18px;border:1px solid var(--bd);position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.sc.b::before{background:var(--p)}.sc.g::before{background:var(--ok)}.sc.a::before{background:var(--wa)}.sc.r::before{background:var(--er)}
.sc .sl{font-size:11px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sc .sv{font-size:26px;font-weight:700;line-height:1;margin-bottom:5px}
.sc .ss{font-size:12px;color:var(--tl)}
.sc .si{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.sc.b .si{background:var(--pl);color:var(--p)}.sc.g .si{background:var(--okl);color:var(--ok)}.sc.a .si{background:var(--wal);color:var(--wa)}.sc.r .si{background:var(--erl);color:var(--er)}
/* CARD */
.card{background:white;border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh)}
.ch{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ct2{padding:18px}.cf{padding:12px 18px;border-top:1px solid var(--bd)}
.ctitle{font-size:14px;font-weight:700}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;padding:9px 13px;background:var(--bg);border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
td{padding:11px 13px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
tr:hover td{background:#FAFBFD}
tr:last-child td{border-bottom:none}
/* BADGE */
.bx{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.ok{background:var(--okl);color:#065F46}.wa{background:var(--wal);color:#92400E}.er{background:var(--erl);color:#991B1B}.pr{background:var(--pl);color:var(--pd)}.gy{background:#F1F5F9;color:#475569}.bl{background:#DBEAFE;color:#1D4ED8}.pu{background:#EDE9FE;color:#5B21B6}
/* BTN */
.btn{padding:8px 15px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.bp{background:var(--p);color:white}.bp:hover{background:var(--pd)}
.bs{background:var(--ok);color:white}
.bd2{background:var(--er);color:white}
.bo{background:white;border:1px solid var(--bd);color:var(--tx)}.bo:hover{background:var(--bg)}
.bsm{padding:5px 9px;font-size:12px}
.bic{width:28px;height:28px;padding:0;justify-content:center}
/* FORM */
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.fr.f1{grid-template-columns:1fr}
.fr.f3{grid-template-columns:1fr 1fr 1fr}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--tm);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
input.i,select.i,textarea.i{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;color:var(--tx);outline:none;background:white;transition:border-color .2s;font-family:inherit}
input.i:focus,select.i:focus,textarea.i:focus{border-color:var(--p)}
textarea.i{resize:vertical;min-height:76px}
/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:1000;align-items:center;justify-content:center}
.mo.op{display:flex}
.md{background:white;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:580px;max-height:88vh;overflow-y:auto}
.mh{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1;border-radius:14px 14px 0 0}
.mt{font-size:15px;font-weight:700}
.mb2{padding:22px}
.mf{padding:14px 22px;border-bottom:1px solid var(--bd); border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:white}
.xb{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tm)}
/* MISC */
.av32{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0}
.flex{display:flex;align-items:center}
.gap2{gap:8px}.gap3{gap:12px}
.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}.mb5{margin-bottom:20px}
.ri{padding:11px 0;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.ri:last-child{border-bottom:none}
.ai{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.ai:last-child{border-bottom:none}
.prog{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.pb{height:100%;border-radius:3px}
.divider{height:1px;background:var(--bd);margin:16px 0}
#toast{position:fixed;bottom:22px;right:22px;background:var(--tx);color:white;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(80px);transition:transform .3s;box-shadow:0 4px 12px rgba(0,0,0,.2)}
#toast.show{transform:translateY(0)}
#toast.ok{background:var(--ok)}
#toast.wa{background:var(--wa)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.lb{margin-bottom:12px}
.lbh{display:flex;justify-content:space-between;margin-bottom:3px;font-size:13px}
.loading{text-align:center;padding:40px;color:var(--tm);font-size:13px}
.empty{text-align:center;padding:40px;color:var(--tl)}
.empty i{font-size:32px;margin-bottom:10px;display:block;opacity:.4}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdh{text-align:center;font-size:10px;font-weight:700;color:var(--tm);padding:5px 0;text-transform:uppercase}
.cd{min-height:32px;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:12px;cursor:pointer;transition:background .1s}
.cd.today{background:var(--p);color:white;font-weight:700}
.cd.hol{background:var(--erl);color:var(--er);font-weight:600}
.cd.wkd{color:var(--tl)}
.cd.lv{background:var(--wal);color:#92400E}
.payslip-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13px}
.payslip-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="shell">
  <div class="sb">
    <div class="sb-hd"><div class="sb-ico"><i class="fas fa-people-group"></i></div><span class="sb-title">PeopleCore</span></div>
    <div class="sb-user">
      <div class="av" id="sb-av" style="background:#4F46E5">--</div>
      <div><div class="u-name" id="sb-name">Loading…</div><div class="u-role">Admin</div></div>
    </div>
    <nav class="sb-nav">
      <div class="nl">Overview</div>
      <div class="ni on" data-pg="dashboard"><i class="fas fa-house"></i>Dashboard</div>
      <div class="ni" data-pg="employees"><i class="fas fa-users"></i>Employees</div>
      <div class="nl">Time & Attendance</div>
      <div class="ni" data-pg="attendance"><i class="fas fa-fingerprint"></i>Attendance</div>
      <div class="ni" data-pg="leaves"><i class="fas fa-umbrella-beach"></i>Leave Management<span class="nb" id="leave-badge">0</span></div>
      <div class="nl">Finance</div>
      <div class="ni" data-pg="payroll"><i class="fas fa-money-bill-wave"></i>Payroll</div>
      <div class="ni" data-pg="incentives"><i class="fas fa-award"></i>Bonuses & Incentives</div>
      <div class="nl">Company</div>
      <div class="ni" data-pg="holidays"><i class="fas fa-calendar-days"></i>Holiday Calendar</div>
      <div class="ni" data-pg="departments"><i class="fas fa-sitemap"></i>Departments</div>
      <div class="nl">People</div>
      <div class="ni" data-pg="wellbeing"><i class="fas fa-heart-pulse"></i>Wellbeing</div>
      <div class="ni" data-pg="announcements"><i class="fas fa-bullhorn"></i>Announcements</div>
      <div class="ni" data-pg="reports"><i class="fas fa-chart-bar"></i>Reports</div>
    </nav>
    <div class="sb-ft">
      <div class="ni" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Sign out</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="tb-title" id="tb-title">Dashboard</div>
      <div class="tb-search"><i class="fas fa-search"></i><input id="search-inp" placeholder="Search employees…" oninput="searchEmployees(this.value)"></div>
      <div class="tb-right">
        <div class="ib"><i class="fas fa-bell"></i><div class="nd"></div></div>
        <button class="lob" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Sign out</button>
      </div>
    </div>
    <div class="ct" id="ct">
      <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading…</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="mo" id="mo" onclick="if(event.target===this)closeMo()"><div class="md" id="md"></div></div>
<div id="toast"></div>

<script src="config.js"></script>
<script>
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let me=null, employees=[], departments=[], holidays=[], currentPage='dashboard';
const COLORS=['#4F46E5','#7C3AED','#059669','#DC2626','#D97706','#0891B2','#0F766E','#9333EA','#BE185D'];

// ─── INIT ───
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  const {data:emp}=await sb.from('employees').select('*').eq('user_id',session.user.id).single();
  if(!emp||emp.role!=='admin'){location.href='index.html';return;}
  me=emp;
  document.getElementById('sb-av').textContent=initials(emp.first_name,emp.last_name);
  document.getElementById('sb-av').style.background=emp.avatar_color||'#4F46E5';
  document.getElementById('sb-name').textContent=emp.first_name+' '+emp.last_name;
  await Promise.all([loadEmployees(),loadDepartments(),loadHolidays()]);
  await updateLeaveBadge();
  document.querySelectorAll('.ni[data-pg]').forEach(el=>el.onclick=()=>navigate(el.dataset.pg));
  navigate('dashboard');
}

async function loadEmployees(){
  const {data}=await sb.from('employees').select('*').order('first_name');
  employees=data||[];
}
async function loadDepartments(){
  const {data}=await sb.from('departments').select('*').order('name');
  departments=data||[];
}
async function loadHolidays(){
  const {data}=await sb.from('holidays').select('*').order('date');
  holidays=data||[];
}
async function updateLeaveBadge(){
  const {count}=await sb.from('leave_requests').select('id',{count:'exact',head:true}).eq('status','pending');
  const el=document.getElementById('leave-badge');
  el.textContent=count||0;
  el.style.display=(count&&count>0)?'inline':'none';
}

// ─── NAVIGATE ───
function navigate(pg){
  currentPage=pg;
  document.querySelectorAll('.ni[data-pg]').forEach(el=>el.classList.toggle('on',el.dataset.pg===pg));
  const titles={dashboard:'Dashboard',employees:'Employees',attendance:'Attendance',leaves:'Leave Management',payroll:'Payroll',incentives:'Bonuses & Incentives',holidays:'Holiday Calendar',departments:'Departments',wellbeing:'Employee Wellbeing',announcements:'Announcements',reports:'Reports & Analytics'};
  document.getElementById('tb-title').textContent=titles[pg]||pg;
  const ct=document.getElementById('ct');
  ct.innerHTML='<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading…</div>';
  const renders={dashboard:renderDashboard,employees:renderEmployees,attendance:renderAttendance,leaves:renderLeaves,payroll:renderPayroll,incentives:renderIncentives,holidays:renderHolidays,departments:renderDepartments,wellbeing:renderWellbeing,announcements:renderAnnouncements,reports:renderReports};
  if(renders[pg]) renders[pg]();
}

// ─── DASHBOARD ───
async function renderDashboard(){
  const today=new Date().toISOString().split('T')[0];
  const [{count:totalEmp},{count:presentToday},{count:pendingLeaves},{data:pendingLeaveList}]=await Promise.all([
    sb.from('employees').select('id',{count:'exact',head:true}).eq('status','active'),
    sb.from('attendance').select('id',{count:'exact',head:true}).eq('date',today).eq('status','present'),
    sb.from('leave_requests').select('id',{count:'exact',head:true}).eq('status','pending'),
    sb.from('leave_requests').select('*,employees(first_name,last_name,avatar_color,department)').eq('status','pending').limit(5),
  ]);
  const {data:announcements}=await sb.from('announcements').select('*').order('created_at',{ascending:false}).limit(3);
  const upcoming=holidays.filter(h=>h.date>=today).slice(0,4);
  document.getElementById('ct').innerHTML=`
  <div class="ph"><div><h2>Admin Dashboard</h2><p>${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p></div>
    <button class="btn bp" onclick="openAddEmployee()"><i class="fas fa-plus"></i> Add Employee</button></div>
  <div class="sg">
    <div class="sc b"><div class="sl">Total Employees</div><div class="sv">${totalEmp||0}</div><div class="ss">Active workforce</div><div class="si"><i class="fas fa-users"></i></div></div>
    <div class="sc g"><div class="sl">Present Today</div><div class="sv">${presentToday||0}</div><div class="ss">Clocked in</div><div class="si"><i class="fas fa-circle-check"></i></div></div>
    <div class="sc a"><div class="sl">Pending Leaves</div><div class="sv">${pendingLeaves||0}</div><div class="ss">Need review</div><div class="si"><i class="fas fa-clock"></i></div></div>
    <div class="sc r"><div class="sl">Departments</div><div class="sv">${departments.length}</div><div class="ss">Across company</div><div class="si"><i class="fas fa-sitemap"></i></div></div>
  </div>
  <div class="g2">
    <div class="card"><div class="ch"><span class="ctitle">Pending Leave Requests</span><span class="bx wa">${pendingLeaves||0} pending</span></div>
      <div class="ct2">${pendingLeaveList&&pendingLeaveList.length?pendingLeaveList.map(l=>`
      <div class="ri"><div class="flex gap2">
        <div class="av32" style="background:${l.employees?.avatar_color||'#4F46E5'}">${initials(l.employees?.first_name||'?',l.employees?.last_name||'')}</div>
        <div><div style="font-size:13px;font-weight:600">${l.employees?.first_name} ${l.employees?.last_name}</div>
        <div style="font-size:12px;color:var(--tm)">${l.leave_type} · ${l.days} day(s) · ${fmtDate(l.from_date)}</div></div></div>
        <div class="flex gap2">
          <button class="btn bs bsm bic" onclick="actLeave('${l.id}','approved')"><i class="fas fa-check"></i></button>
          <button class="btn bd2 bsm bic" onclick="actLeave('${l.id}','rejected')"><i class="fas fa-times"></i></button>
        </div></div>`).join(''):'<div class="empty"><i class="fas fa-inbox"></i>No pending requests</div>'}</div>
    </div>
    <div class="card"><div class="ch"><span class="ctitle">Upcoming Holidays</span></div>
      <div class="ct2">${upcoming.map(h=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)">
        <div style="text-align:center;min-width:40px;background:var(--pl);border-radius:7px;padding:4px">
          <div style="font-size:17px;font-weight:700;color:var(--p)">${new Date(h.date+'T00:00:00').getDate()}</div>
          <div style="font-size:9px;color:var(--p);text-transform:uppercase">${new Date(h.date+'T00:00:00').toLocaleString('default',{month:'short'})}</div></div>
        <div><div style="font-size:13px;font-weight:600">${h.name}</div><span class="bx ${h.type==='National'?'pr':'pu'}">${h.type}</span></div>
      </div>`).join('')}
      </div>
    </div>
  </div>
  ${announcements&&announcements.length?`<div class="card"><div class="ch"><span class="ctitle">Recent Announcements</span><button class="btn bo bsm" onclick="navigate('announcements')">View all</button></div><div class="ct2">
    ${announcements.map(a=>`<div style="padding:10px 0;border-bottom:1px solid var(--bd)"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:600">${a.title}</span><span class="bx pr">${a.category}</span></div><p style="font-size:12px;color:var(--tm)">${a.content.substring(0,120)}…</p></div>`).join('')}
  </div></div>`:''}`;
}

// ─── EMPLOYEES ───
async function renderEmployees(){
  document.getElementById('ct').innerHTML=`
  <div class="ph"><div><h2>Employees</h2><p>${employees.length} members in your team</p></div>
    <button class="btn bp" onclick="openAddEmployee()"><i class="fas fa-plus"></i> Add Employee</button></div>
  <div class="card"><div class="ch">
    <div class="flex gap2">
      <input class="i" style="width:200px" placeholder="Search…" oninput="filterEmpTable(this.value)" id="emp-search">

function filterEmpTable(q){
  const dept=document.getElementById('dept-filter')?.value||'';
  const rows=document.querySelectorAll('#emp-table tbody tr');
  rows.forEach(r=>{

    const deptMatch=!dept||r.children[2]?.textContent===dept;
    r.style.display=(txt.includes(q.toLowerCase())&&deptMatch)?'':'none';
  });
}

async function saveNewEmployee(){
  const fn=v('e-fn'),ln=v('e-ln'),em=v('e-em'),pw=v('e-pw'),ec=v('e-ec'),de=v('e-de'),dp=v('e-dp'),dj=v('e-dj'),sl=v('e-sl'),rl=v('e-rl');
  if(!fn||!ln||!em||!pw||!ec){toast('Fill in required fields (*)','wa');return;}
  if(pw.length<8){toast('Password must be at least 8 characters','wa');return;}

  // Create auth user via admin (needs service role in a real setup — here we use signUp)
  const {data:au,error:ae}=await sb.auth.admin?sb.auth.admin.createUser({email:em,password:pw,email_confirm:true}):{data:null,error:{message:'Use Supabase dashboard to create auth user manually'}};
  let uid=au?.user?.id;

  if(ae){
    // Fallback: insert employee without user_id (admin links later)
    toast('Note: create auth login in Supabase Auth manually for this employee','wa');
  }

  const color=COLORS[Math.floor(Math.random()*COLORS.length)];
  const {data:emp,error}=await sb.from('employees').insert({
    employee_code:ec,first_name:fn,last_name:ln,email:em,phone:v('e-ph'),
    department:dp,designation:de,date_of_joining:dj||null,gross_salary:parseFloat(sl)||0,
    role:rl,avatar_color:color,user_id:uid||null
  }).select().single();

  if(error){toast('Error: '+error.message,'er');return;}

  // Seed default leave balances
  const balances=[
    {employee_id:emp.id,leave_type:'Annual Leave',total_days:20,year:2026},
    {employee_id:emp.id,leave_type:'Sick Leave',total_days:10,year:2026},
    {employee_id:emp.id,leave_type:'Casual Leave',total_days:7,year:2026},
    {employee_id:emp.id,leave_type:'Comp Off',total_days:0,year:2026},
    {employee_id:emp.id,leave_type:'Work From Home',total_days:8,year:2026},
  ];
  await sb.from('leave_balances').insert(balances);

  employees.push(emp);
  closeMo();
  toast(`${fn} ${ln} added successfully!`,'ok');
  renderEmployees();
}

async function saveAttendance(){
  const empId=v('a-emp'),date=v('a-dt'),type=v('a-tp'),ci=v('a-ci'),co=v('a-co'),status=v('a-st');
  if(!empId||!date){toast('Select employee and date','wa');return;}
  const ciTs=ci?`${date}T${ci}:00`:null;
  const coTs=co?`${date}T${co}:00`:null;
  const hours=ci&&co?Math.round((new Date(coTs)-new Date(ciTs))/3600000*10)/10:null;
  const {error}=await sb.from('attendance').upsert({employee_id:empId,date,type,status,check_in:ciTs,check_out:coTs,hours_worked:hours},{onConflict:'employee_id,date'});
  if(error){toast('Error: '+error.message,'er');return;}
  closeMo();toast('Attendance recorded!','ok');renderAttendance();
}

  <div class="ph"><div><h2>Reports & Analytics</h2></div></div>
  <div class="sg">
    <div class="sc b"><div class="sl">Total Headcount</div><div class="sv">${employees.length}</div><div class="ss">Active employees</div><div class="si"><i class="fas fa-users"></i></div></div>
    <div class="sc g"><div class="sl">Monthly Payroll</div><div class="sv">₹${(totalSalary/1000).toFixed(0)}K</div><div class="ss">Gross total</div><div class="si"><i class="fas fa-money-bill-wave"></i></div></div>
    <div class="sc a"><div class="sl">Departments</div><div class="sv">${departments.length}</div><div class="ss">Teams</div><div class="si"><i class="fas fa-sitemap"></i></div></div>
    <div class="sc r"><div class="sl">Avg Salary</div><div class="sv">₹${employees.length?Math.round(totalSalary/employees.length).toLocaleString('en-IN'):'0'}</div><div class="ss">Per employee</div><div class="si"><i class="fas fa-chart-bar"></i></div></div>
  </div>
  <div class="g2">
    <div class="card"><div class="ch"><span class="ctitle">Headcount by Department</span></div><div class="ct2">
      ${deptCounts.filter(d=>d.count>0).map(d=>`
      <div class="lb"><div class="lbh"><strong>${d.name}</strong><span>${d.count} employee${d.count!==1?'s':''}</span></div>
      <div class="prog"><div class="pb" style="width:${Math.max(5,(d.count/employees.length)*100)}%;background:var(--p)"></div></div></div>`).join('')||'<div class="empty">No data</div>'}
    </div></div>
    <div class="card"><div class="ch"><span class="ctitle">Download Reports</span></div><div class="ct2">
      ${[
        {icon:'fas fa-users',label:'Employee Directory',color:'#4F46E5'},
        {icon:'fas fa-fingerprint',label:'Attendance Report',color:'#059669'},
        {icon:'fas fa-umbrella-beach',label:'Leave Summary',color:'#D97706'},
        {icon:'fas fa-money-bill',label:'Payroll Report',color:'#7C3AED'},
        {icon:'fas fa-award',label:'Incentives Report',color:'#DC2626'},
        {icon:'fas fa-heart-pulse',label:'Wellbeing Report',color:'#0891B2'},
      ].map(r=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd)">
        <div class="flex gap2"><i class="${r.icon}" style="color:${r.color};width:18px"></i><span style="font-size:13px">${r.label}</span></div>
        <button class="btn bo bsm" onclick="exportReport('${r.label}')"><i class="fas fa-download"></i></button>
      </div>`).join('')}
    </div></div>
  </div>`;

async function exportReport(label){
  let csv='',filename=label.replace(/\s+/g,'_').toLowerCase()+'.csv';
  if(label==='Employee Directory'){
    csv='Code,Name,Email,Department,Designation,Joined,Salary,Status\n';
    csv+=employees.map(e=>`${e.employee_code},${e.first_name} ${e.last_name},${e.email},${e.department||''},${e.designation||''},${e.date_of_joining||''},${e.gross_salary||0},${e.status}`).join('\n');
  } else {
    csv=`${label}\nGenerated: ${new Date().toLocaleString('en-IN')}`;
  }
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  toast(`${label} downloaded!`,'ok');
}

function exportCSV(){
  let csv='Code,Name,Email,Department,Designation,Phone,Date of Joining,Gross Salary,Status\n';
  csv+=employees.map(e=>`${e.employee_code},"${e.first_name} ${e.last_name}",${e.email},${e.department||''},${e.designation||''},${e.phone||''},${e.date_of_joining||''},${e.gross_salary||0},${e.status}`).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='employees.csv';a.click();
  toast('CSV exported!','ok');
}

// ─── HELPERS ───
function buildCal(year,month){
  const hDates=holidays.filter(h=>{const d=new Date(h.date+'T00:00:00');return d.getFullYear()===year&&d.getMonth()===month;}).map(h=>new Date(h.date+'T00:00:00').getDate());
  const first=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();
  const today=new Date();
  let html=`<div class="cal-grid">`;
  ['S','M','T','W','T','F','S'].forEach(d=>html+=`<div class="cdh">${d}</div>`);
  for(let i=0;i<first;i++)html+=`<div class="cd"></div>`;
  for(let d=1;d<=days;d++){
    const isToday=today.getDate()===d&&today.getMonth()===month&&today.getFullYear()===year;
    const isHol=hDates.includes(d);
    const dow=new Date(year,month,d).getDay();
    const isWknd=dow===0||dow===6;
    html+=`<div class="cd${isToday?' today':isHol?' hol':isWknd?' wkd':''}" title="${isHol?holidays.find(h=>new Date(h.date+'T00:00:00').getDate()===d&&new Date(h.date+'T00:00:00').getMonth()===month)?.name:''}">${d}</div>`;
  }
  return html+'</div>';
}

function starRating(n){if(!n)return'<span style="color:var(--tl)">—</span>';return'★'.repeat(n)+'☆'.repeat(5-n);}
function initials(fn,ln){return((fn||'?')[0]+(ln||'')[0]).toUpperCase();}
function fmtDate(d){if(!d)return'-';return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function closeMo(){document.getElementById('mo').classList.remove('op');}
let toastT;
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className=`show${type?' '+type:''}`;clearTimeout(toastT);toastT=setTimeout(()=>t.className='',3200);}
async function logout(){await sb.auth.signOut();location.href='index.html';}
